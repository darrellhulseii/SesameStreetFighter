// ══════════════════════════════════════════════════════
//  FIGHT RUNNER (shared by all modes)
// ══════════════════════════════════════════════════════
function runFight(dt,running){
  drawStage(C,stage,gameT);
  if(running&&!roundOverTimer){
    if(roundTimer>0)roundTimer-=dt;
    p1.update(dt,INP,p2);
    const diff=GAMEMODE==='survival'?survDifficulty():1;
    const aiI=ai.update(p2,p1,dt,diff);p2.update(dt,aiI,p1);
    doCombat(p1,p2);doCombat(p2,p1);
    // In-place projectile update - avoids allocation, caps at 24
    for(let i=PROJS.length-1;i>=0;i--){
      if(!PROJS[i].update(dt,PROJS[i].owner===p1?p2:p1))PROJS.splice(i,1);
    }
    if(PROJS.length>24)PROJS.splice(0,PROJS.length-24);
    // PROJECTILE COLLISION: projectiles from different owners cancel each other
    for(let i=PROJS.length-1;i>=0;i--){
      for(let j=i-1;j>=0;j--){
        const pa=PROJS[i],pb=PROJS[j];
        if(pa.owner===pb.owner)continue;// same owner - skip
        const dx=pa.x-pb.x,dy=pa.y-pb.y,dist=Math.sqrt(dx*dx+dy*dy);
        const collideR=18;// collision radius
        if(dist<collideR){
          const mx=(pa.x+pb.x)*.5,my=(pa.y+pb.y)*.5;
          // Explosion effect at collision point
          FX.hitSpark(mx,my,true,'#ffaa22');
          FX.addText(mx,my-24,'CLASH!','#ffdd00',20);
          for(let sp=0;sp<10;sp++){const sa=sp/10*Math.PI*2,spd=rand(1.5,4),lf=rand(.3,.6);FX.parts.push({x:mx,y:my,vx:Math.cos(sa)*spd,vy:Math.sin(sa)*spd-2,life:lf,ml:lf,col:sp%2?'#ffaa44':'#44aaff',r:rand(2,5),type:'s'});}
          FX.screenShake(3);
          pa.life=-1;pb.life=-1;// mark both as expired
          PROJS.splice(j,1);if(i>j)i--;// remove pb; pa will be filtered next frame by life<0
          break;
        }
      }
    }
    if(roundTimer<=0&&!p1.dead&&!p2.dead){if(p1.hp>=p2.hp){p2.hp=0;p2.dead=true;p2.state='down';}else{p1.hp=0;p1.dead=true;p1.state='down';}roundTimer=0;}
  }
  if(p2.x<p1.x){p1.draw(C);p2.draw(C);}else{p2.draw(C);p1.draw(C);}
  for(let _i=0;_i<PROJS.length;_i++)PROJS[_i].draw(C);FX.draw(C);
  drawHUD(C,p1,p2,roundTimer,round);
  // 8-bit CRT overlay - two passes for richer scanline feel
  C.fillStyle='rgba(0,0,0,.07)';C.fillRect(0,0,W,H);
  C.fillStyle='rgba(0,0,0,.04)';C.fillRect(0,0,W,H);drawControls(C,p1.data);
  if(GAMEMODE==='survival')drawSurvivalOverlay(C);
  if(msgTimer>0){msgTimer-=dt;const ma=Math.min(1,msgTimer*.85);C.save();C.globalAlpha=ma;C.fillStyle=msgCol;C.font=`bold ${msgSize}px Impact,sans-serif`;C.textAlign='center';C.strokeStyle='#000';C.lineWidth=7;C.strokeText(msgText,W/2,H*.48);C.fillText(msgText,W/2,H*.48);C.restore();}
}

function handleFightRoundOver(dt){
  if((p1.dead||p2.dead)&&!roundOverTimer){
    roundOverTimer=.01;
    if(!p1.dead)p1Wins++;else p2Wins++;
    // Boss fight special K.O.
    const bossIds=['judo_master','smeagol','sauron'];
    const isBoss=p2&&p2.data&&bossIds.includes(p2.data.id);
    const bossCols={judo_master:'#00ffcc',smeagol:'#88ff44',sauron:'#ff4400'};
    const bossCol=p2&&p2.data?bossCols[p2.data.id]||'#ffdd00':'#ffdd00';
    if(isBoss&&!p1.dead){FX.addText(W/2,H*.42,'BOSS DEFEATED!!',bossCol,52);FX.screenShake(12);FX.hitstop=.6;showMsg('BOSS DEFEATED!!',bossCol,52,2.8);}
    else{FX.addText(W/2,H*.42,'K.O.!','#ffdd00',64);FX.screenShake(8);FX.hitstop=.45;JAZZ.note(48,.18);JAZZ.note(55,.14);showMsg('K.O.!','#ffdd00',64,2.0);}
    // Mode-specific scoring
    if(GAMEMODE==='survival'&&p1.dead){SURV.best=Math.max(SURV.best,SURV.score);saveSurvBest();}
    if(GAMEMODE==='survival'&&!p1.dead){
      SURV.score+=SURV.wave*100+SURV.streak*20;SURV.streak++;SURV.totalKOs++;
      // UNLOCK PHANTOM on Judo Master defeat
      if(p2.data.id==='judo_master'&&!UNLOCKED.has('phantom')){unlock('phantom');SURV.phantomUnlocked=true;}
    }
  }
  if(roundOverTimer>0){
    roundOverTimer+=dt;
    if(roundOverTimer>=2.6){
      roundOverTimer=0;
      if(GAMEMODE==='arcade'){
        if(p1Wins>=2||p2Wins>=2){
          // Trigger arcade unlock for the current character
          if(p1Wins>=2&&p1&&p1.data){
            const aUnlockId=UNLOCK_MAP[p1.data.id];
            if(aUnlockId&&!UNLOCKED.has(aUnlockId)){unlock(aUnlockId);showMsg('[+] UNLOCKED: '+(UNLOCKABLE_CHARS[aUnlockId]||ANIME_CHARS[aUnlockId]||{}).name,'#ffdd00',22,2.8);}
          }
          STATE='result';
        }else{nextRound();STATE='vs';vsT=0;}
      } else if(GAMEMODE==='survival'){
        if(p1.dead){STATE='surv_over';}
        else{
          // Wave clear - brief celebration then next wave
          SURV.wave++;SURV.waveClearing=true;SURV.waveClearTimer=0;
          survHPRestore();survStartWave();// sets STATE='vs' internally
        }
      } else if(GAMEMODE==='story'){
        if(p1.dead){// Retry - skip dialogue, jump straight back to fight
          STOR.retrying=true;
          const ch=storyCurrent();
          if(ch){
            const hero=getCHAR(STOR.charId),opp=getCHAR(ch.opp);
            if(hero&&opp){
              p1=new Fighter(hero,0);p2=new Fighter(opp,1);
              stage=ch.st||0;PROJS=[];FX.parts=[];FX.trails=[];FX.flashA=0;
              p1Wins=0;p2Wins=0;round=1;roundTimer=99;roundOverTimer=0;
              ai.reset();vsT=0;gameT=0;STATE='vs';
            } else {STATE='menu';}
          } else {STATE='menu';}
        } else{
          storyNextChapter();
        }
      }
    }
  }
}

// AI difficulty scaling is built into AI.update(fighter,opponent,dt,diff=1) in the class

// ══════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════
let lastT=0;
function loop(now){
  const dt=Math.min(.05,(now-lastT)/1000);lastT=now;gameT+=dt;titleT+=dt;
  frameNow=now|0;// update cached timestamp each frame
  try{
  INP.update();
  const running=FX.update(dt);
  C.clearRect(0,0,W,H);

  // Survival wave clear timer
  if(SURV.waveClearing){SURV.waveClearTimer+=dt;if(SURV.waveClearTimer>1.8)SURV.waveClearing=false;}

  switch(STATE){
    case'title':
      drawTitle(C,titleT);
      if(INP.jp.A||INP.jp.B||INP.jp.C||INP.jp.S){JAZZ.start();STATE='menu';menuCursor=0;gameT=0;}
      break;

    case'menu':
      drawMenu(C,gameT);
      if(INP.jp.A){
        GAMEMODE=['arcade','survival','story'][menuCursor];
        selectCursor=0;selectLocked=false;STATE='select';gameT=0;
      }
      if(INP.jp.B||INP.dir.x<0){menuCursor=(menuCursor+2)%3;}
      if(INP.jp.C||INP.dir.x>0){menuCursor=(menuCursor+1)%3;}
      break;

    case'select':
      drawSelect(C,gameT);drawModeHeader(C);
      if(INP.jp.A){
        const r=getDisplayRoster();
        const charId=r[selectCursor];
        if(!charId||!isCharUnlocked(charId)){showMsg('LOCKED!','#ff4400',22,.8);break;}
        selectLocked=true;
        if(GAMEMODE==='arcade')beginSelectStage(charId);
        else if(GAMEMODE==='survival'){survBegin(charId);JAZZ.start();}
        else if(GAMEMODE==='story'){
          if(UNLOCKABLE_CHARS[charId]||ANIME_CHARS[charId])beginSelectStage(charId);
          else{storyBegin(charId);JAZZ.start();}
        }
      }
      break;

    case'stagesel':
      drawStageSelect(C,gameT);
      if(INP.jp.A)startFight();
      if(INP.jp.B)stageCursor=(stageCursor+STAGES.length-1)%STAGES.length;
      if(INP.jp.C)stageCursor=(stageCursor+1)%STAGES.length;
      break;

    case'story_scene':
      drawStoryScene(C,gameT);
      STOR.sceneT+=dt;
      if(INP.jp.A||INP.jp.B||INP.jp.C||INP.jp.S){
        const ch=storyCurrent();const dlg=ch?.d||[];
        const txt=dlg[STOR.dialogLine]||'';
        const charCount=Math.floor(Math.min(gameT*STOR.sceneT*80+1,txt.length));
        if(charCount<txt.length){STOR.sceneT=9999;}// skip typewriter
        else if(STOR.dialogLine<dlg.length-1){STOR.dialogLine++;STOR.sceneT=0;gameT=0;}
        else{startStoryFight();}// all lines done -> begin the fight
      }
      break;

    case'vs':
      vsT+=dt;drawStage(C,stage,gameT);drawVS(C,p1,p2,vsT);
      if(GAMEMODE==='survival')drawSurvivalOverlay(C);
      const vsWait=STOR.retrying?0.8:2.4;
      if(vsT>=vsWait){STATE='fight';STOR.retrying=false;showMsg('FIGHT!','#ffff00',62,.85);}
      break;

    case'fight':
      runFight(dt,running);
      handleFightRoundOver(dt);
      break;

    case'result':
      drawStage(C,stage,gameT);drawResult(C,p1,p2,gameT);FX.draw(C);break;

    case'story_win':
      drawStoryWin(C,gameT);break;

    case'surv_over':
      drawSurvivalOver(C,gameT);break;
    default:
      // Unknown state: reset to title safely
      console.warn('Unknown STATE:',STATE);STATE='title';gameT=0;break;
  }
  }catch(e){
    // Loop error recovery - draw error message and keep running
    C.fillStyle='#000';C.fillRect(0,0,W,H);
    C.fillStyle='#ff4400';C.font='bold 14px monospace';C.textAlign='center';
    C.fillText('ERROR: '+e.message,W/2,H/2-10);
    C.fillStyle='#fff';C.font='10px monospace';
    C.fillText('Press Z or tap to continue',W/2,H/2+10);
    console.error('Loop error:',e);
  }
  requestAnimationFrame(loop);
}

// ══════════════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════════════
function toCP(e){const s=scl(),r=cv.getBoundingClientRect(),src=e.changedTouches?e.changedTouches[0]:e;return{x:(src.clientX-r.left)/s,y:(src.clientY-r.top)/s};}
function handleTap(px,py){
  JAZZ.start();
  if(STATE==='title'){STATE='menu';menuCursor=0;gameT=0;return;}
  if(STATE==='menu'){
    const modes=['arcade','survival','story'];const cW=200,gap=24,total=modes.length*(cW+gap)-gap,sx2=(W-total)/2;
    for(let i=0;i<modes.length;i++){const cx=sx2+i*(cW+gap);if(px>=cx&&px<=cx+cW&&py>=130&&py<=330){if(menuCursor===i){GAMEMODE=modes[i];selectCursor=0;selectLocked=false;STATE='select';gameT=0;}else{menuCursor=i;}return;}}
    return;
  }
  if(STATE==='select'){
    const r=getDisplayRoster();
    for(let i=0;i<r.length;i++){const{x,y,w,h}=gridPos(i);if(px>=x&&px<=x+w&&py>=y&&py<=y+h){
      const charId=r[i];
      selectCursor=i;
      if(!isCharUnlocked(charId)){showMsg('LOCKED!','#ff4400',22,.8);return;}
      selectLocked=true;// freeze hover cursor - confirmed pick
      if(GAMEMODE==='arcade')beginSelectStage(charId);
      else if(GAMEMODE==='survival'){survBegin(charId);JAZZ.start();}
      else if(GAMEMODE==='story'){if(UNLOCKABLE_CHARS[charId]||ANIME_CHARS[charId])beginSelectStage(charId);else storyBegin(charId);}
      return;}}
    return;
  }
  if(STATE==='stagesel'){
    const cW=104,cH=94,gap=6,row1Count=7,row1Y=40,row2Y=row1Y+cH+8;
    const row1StartX=(W-(row1Count*(cW+gap)-gap))/2;
    const row2Count=STAGES.length-row1Count,row2StartX=(W-(row2Count*(cW+gap)-gap))/2;
    for(let i=0;i<STAGES.length;i++){
      const row=i<row1Count?0:1,col=i<row1Count?i:i-row1Count;
      const cx=(row===0?row1StartX:row2StartX)+col*(cW+gap),cy=row===0?row1Y:row2Y;
      if(px>=cx&&px<=cx+cW&&py>=cy&&py<=cy+cH){if(stageCursor===i)startFight();else stageCursor=i;return;}
    }
    return;
  }
  if(STATE==='story_scene'){
    const ch=storyCurrent();const dlg=ch?.d||[];
    if(STOR.dialogLine<dlg.length-1){STOR.dialogLine++;STOR.sceneT=0;gameT=0;}
    else startStoryFight();// last line tapped -> start the fight
    return;
  }
  if(STATE==='result'){p1Wins=0;p2Wins=0;round=1;STATE='menu';gameT=0;return;}
  if(STATE==='story_win'){STATE='menu';gameT=0;return;}
  if(STATE==='surv_over'){STATE='menu';gameT=0;return;}
}
cv.addEventListener('click',e=>{const p=toCP(e);handleTap(p.x,p.y);});
cv.addEventListener('touchend',e=>{
  const nonFightStates=['title','menu','select','stagesel','story_scene','result','story_win','surv_over'];
  if(nonFightStates.includes(STATE)){e.preventDefault();const p=toCP(e);handleTap(p.x,p.y);}
},{passive:false});
cv.addEventListener('mousemove',e=>{
  const p=toCP(e);
  if(STATE==='menu'){const cW=200,gap=24,total=3*(cW+gap)-gap,sx2=(W-total)/2;for(let i=0;i<3;i++){const cx=sx2+i*(cW+gap);if(p.x>=cx&&p.x<=cx+cW&&p.y>=130&&p.y<=330){menuCursor=i;return;}}}
  if(STATE==='select'){const r=getDisplayRoster();if(!selectLocked){for(let i=0;i<r.length;i++){const{x,y,w,h}=gridPos(i);if(p.x>=x&&p.x<=x+w&&p.y>=y&&p.y<=y+h){selectCursor=i;return;}}}}
  if(STATE==='stagesel'){const cW2=104,cH2=94,gap2=6,r1c=7,r1y=40,r2y=r1y+cH2+8;const r1sx=(W-(r1c*(cW2+gap2)-gap2))/2,r2c=STAGES.length-r1c,r2sx=(W-(r2c*(cW2+gap2)-gap2))/2;for(let i=0;i<STAGES.length;i++){const row=i<r1c?0:1,col=i<r1c?i:i-r1c,cx=(row===0?r1sx:r2sx)+col*(cW2+gap2),cy=row===0?r1y:r2y;if(p.x>=cx&&p.x<=cx+cW2&&p.y>=cy&&p.y<=cy+cH2){stageCursor=i;return;}}}
});
addEventListener('keydown',e=>{
  JAZZ.start();
  if(STATE==='title'){STATE='menu';menuCursor=0;gameT=0;e.preventDefault();return;}
  if(STATE==='menu'){
    if(e.code==='ArrowRight'||e.code==='KeyD'){menuCursor=(menuCursor+1)%3;}
    else if(e.code==='ArrowLeft'||e.code==='KeyA'){menuCursor=(menuCursor+2)%3;}
    else if(e.code==='KeyZ'||e.code==='Enter'){GAMEMODE=['arcade','survival','story'][menuCursor];selectCursor=0;selectLocked=false;STATE='select';gameT=0;}
    e.preventDefault();return;
  }
  if(STATE==='select'){
    const r=getDisplayRoster();
    const n=r.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')selectCursor=(selectCursor+1)%n;
    else if(e.code==='ArrowLeft'||e.code==='KeyA')selectCursor=(selectCursor-1+n)%n;
    else if(e.code==='ArrowDown'||e.code==='KeyS')selectCursor=Math.min(n-1,selectCursor+5);
    else if(e.code==='ArrowUp'||e.code==='KeyW')selectCursor=Math.max(0,selectCursor-5);
    else if(e.code==='KeyZ'||e.code==='Enter'){
      const charId=r[selectCursor];
      if(!charId||!isCharUnlocked(charId)){showMsg('LOCKED!','#ff4400',22,.8);e.preventDefault();return;}
      selectLocked=true;
      if(GAMEMODE==='arcade')beginSelectStage(charId);
      else if(GAMEMODE==='survival')survBegin(charId);
      else if(GAMEMODE==='story'){if(UNLOCKABLE_CHARS[charId]||ANIME_CHARS[charId])beginSelectStage(charId);else storyBegin(charId);}
    }
    e.preventDefault();return;
  }
  if(STATE==='stagesel'){
    const n=STAGES.length;
    if(e.code==='ArrowRight'||e.code==='KeyD')stageCursor=(stageCursor+1)%n;
    else if(e.code==='ArrowLeft'||e.code==='KeyA')stageCursor=(stageCursor-1+n)%n;
    else if(e.code==='KeyZ'||e.code==='Enter')startFight();
    e.preventDefault();return;
  }
  if(STATE==='story_scene'){
    const ch=storyCurrent();const dlg=ch?.d||[];
    if(e.code==='KeyZ'||e.code==='Enter'||e.code==='Space'){
      if(STOR.dialogLine<dlg.length-1){STOR.dialogLine++;STOR.sceneT=0;gameT=0;}
      else startStoryFight();
    }
    e.preventDefault();return;
  }
  if(STATE==='result'&&(e.code==='Enter'||e.code==='KeyZ')){p1Wins=0;p2Wins=0;round=1;STATE='menu';gameT=0;}
  if(STATE==='story_win'&&(e.code==='Enter'||e.code==='KeyZ')){STATE='menu';gameT=0;}
  if(STATE==='surv_over'&&(e.code==='Enter'||e.code==='KeyZ')){STATE='menu';gameT=0;}
  // Escape / back navigation
  if(e.code==='Escape'||e.code==='Backspace'){
    if(STATE==='select'){selectLocked=false;STATE='menu';gameT=0;}
    else if(STATE==='stagesel'){STATE='select';selectLocked=false;gameT=0;}
    else if(STATE==='result'||STATE==='story_win'||STATE==='surv_over'){STATE='menu';gameT=0;}
    e.preventDefault();
  }
});
requestAnimationFrame(loop);

</script>
