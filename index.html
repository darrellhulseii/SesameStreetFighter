<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes">
<title>PUPPET FIGHTERS v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;}
canvas{touch-action:none;display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
// ══════════════════════════════════════════════════════
//  PUPPET FIGHTERS  v5  —  10 Fighters  |  5 Stages  |  Combos
// ══════════════════════════════════════════════════════
const W=800,H=480,FLOOR=292,GRAV=0.62,MMAX=100;
const cv=document.getElementById('c'),C=cv.getContext('2d');
cv.width=W;cv.height=H;
const scl=()=>Math.min(innerWidth/W,innerHeight/H);
const resize=()=>{const s=scl();cv.style.width=W*s+'px';cv.style.height=H*s+'px';};
resize();addEventListener('resize',resize);
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);this.beginPath();this.moveTo(x+r,y);
    this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;};
}

// ══════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════
const INP=(()=>{
const DBTNS={up:{x:95,y:350},down:{x:95,y:440},left:{x:48,y:395},right:{x:142,y:395}};
const DR=33;
const ABTNS={A:{x:608,y:428},B:{x:668,y:384},C:{x:728,y:428},S:{x:668,y:456}};
const AR=37;
let keys={},dir={x:0,y:0},btn={A:0,B:0,C:0,S:0},jp={A:0,B:0,C:0,S:0};
let touchJp={A:0,B:0,C:0,S:0},prevBtn={A:0,B:0,C:0,S:0};
let dT={},bT={},dA={up:0,down:0,left:0,right:0},bA={A:0,B:0,C:0,S:0};
const toC=(cx,cy)=>{const s=scl(),r=cv.getBoundingClientRect();return{x:(cx-r.left)/s,y:(cy-r.top)/s};};
const d2=(ax,ay,bx,by)=>(ax-bx)**2+(ay-by)**2;
function gDP(px,py){let best=null,bd=DR*DR*1.5;for(const[k,p]of Object.entries(DBTNS)){const d=d2(px,py,p.x,p.y);if(d<bd){bd=d;best=k;}}return best;}
function gAB(px,py){let best=null,bd=AR*AR*1.6;for(const[k,p]of Object.entries(ABTNS)){const d=d2(px,py,p.x,p.y);if(d<bd){bd=d;best=k;}}return best;}
function rD(){dA={up:0,down:0,left:0,right:0};for(const d of Object.values(dT))dA[d]=1;}
function rB(){bA={A:0,B:0,C:0,S:0};for(const b of Object.values(bT))bA[b]=1;}
function clrT(id){if(id in dT){delete dT[id];rD();}if(id in bT){delete bT[id];rB();}}
addEventListener(‘keydown’,e=>{keys[e.code]=1;if([‘Space’,‘ArrowUp’,‘ArrowDown’,‘ArrowLeft’,‘ArrowRight’].includes(e.code))e.preventDefault();});
addEventListener(‘keyup’,e=>{keys[e.code]=0;});
cv.addEventListener(‘touchstart’,e=>{e.preventDefault();for(const t of e.changedTouches){const p=toC(t.clientX,t.clientY),id=t.identifier;if(p.x<210){const d=gDP(p.x,p.y);if(d){dT[id]=d;rD();}}else{const b=gAB(p.x,p.y);if(b){bT[id]=b;touchJp[b]=1;rB();}}}},{passive:false});
cv.addEventListener(‘touchmove’,e=>{e.preventDefault();for(const t of e.changedTouches){const p=toC(t.clientX,t.clientY),id=t.identifier;if(id in dT){const d=gDP(p.x,p.y);if(d&&d!==dT[id]){dT[id]=d;rD();}else if(!d){delete dT[id];rD();}}}},{passive:false});
cv.addEventListener(‘touchend’,e=>{e.preventDefault();for(const t of e.changedTouches)clrT(t.identifier);},{passive:false});
cv.addEventListener(‘touchcancel’,e=>{e.preventDefault();for(const t of e.changedTouches)clrT(t.identifier);},{passive:false});
return{DBTNS,ABTNS,DR,AR,get dir(){return dir;},get btn(){return btn;},get jp(){return jp;},get dA(){return dA;},get bA(){return bA;},
update(){
dir.x=(keys[‘ArrowRight’]||keys[‘KeyD’]?1:0)-(keys[‘ArrowLeft’]||keys[‘KeyA’]?1:0)||(dA.right?1:0)-(dA.left?1:0);
dir.y=(keys[‘ArrowDown’]||keys[‘KeyS’]?1:0)-(keys[‘ArrowUp’]||keys[‘KeyW’]?1:0)||(dA.down?1:0)-(dA.up?1:0);
const kb={A:keys[‘KeyZ’]||keys[‘KeyJ’]?1:0,B:keys[‘KeyX’]||keys[‘KeyK’]?1:0,C:keys[‘KeyC’]||keys[‘KeyL’]?1:0,S:keys[‘KeyV’]||keys[‘Space’]?1:0};
for(const b of[‘A’,‘B’,‘C’,‘S’]){const was=prevBtn[b];btn[b]=Math.max(kb[b],bA[b]?1:0);jp[b]=(btn[b]&&!was)?1:0;if(touchJp[b]){jp[b]=1;touchJp[b]=0;}prevBtn[b]=btn[b];}
}
};
})();

// ══════════════════════════════════════════════════════
//  RELAXED LOUNGE JAZZ  (smooth, warm, ambient)
// ══════════════════════════════════════════════════════
const JAZZ=(()=>{
let ac,master,reverb,playing=false,nextBar=0,barIdx=0;
const BPM=80,B=60/BPM; // Slow, relaxed tempo
const f=m=>440*2**((m-69)/12);
// Gentle swing feel — very subtle
const sw=i=>i%2===0?B/2*1.22:B/2*0.78;
// Smooth Fmaj7 → Dm9 → Bbmaj7 → C9 progression (warm & mellow)
const PROG=[
{b:[41,45,48,41,45,48,50,48],ch:[65,69,72,76,79],mel:[76,74,72,74,76,77,76,74]},// Fmaj9
{b:[38,41,45,38,41,45,47,45],ch:[62,65,69,72,76],mel:[74,72,69,72,74,72,71,69]},// Dm9
{b:[34,37,41,34,37,41,43,41],ch:[58,62,65,69,72],mel:[72,70,69,67,69,70,69,67]},// Bbmaj7
{b:[36,40,43,36,40,43,45,43],ch:[60,64,67,71,74],mel:[69,67,65,67,69,71,72,71]},// C9
];
// Simulated reverb via gain node with slight delay
function mkRev(){
if(!ac)return null;
const delay=ac.createDelay(0.08);delay.delayTime.value=0.06;
const g=ac.createGain();g.gain.value=0.18;
delay.connect(g);g.connect(master);return delay;
}
function softNote(fr,t,dur,type,vol,useRev){
if(!ac)return;
const o=ac.createOscillator(),g=ac.createGain();
o.type=type;o.frequency.value=fr;
// Warm detuning for richness
if(type===‘triangle’)o.detune.value=rand(-3,3);
g.gain.setValueAtTime(0,t);
g.gain.linearRampToValueAtTime(vol,t+0.08); // Soft attack
g.gain.setValueAtTime(vol,t+dur*0.55);
g.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.12); // Long gentle decay
o.connect(g);g.connect(master);
if(useRev&&reverb){const rv=ac.createGain();rv.gain.value=0.2;g.connect(rv);rv.connect(reverb);}
o.start(t);o.stop(t+dur+0.25);
}
function schedBar(t,bi){
const p=PROG[bi%4];
// Soft upright bass — sine wave, mellow
let bt=t;
for(let i=0;i<8;i++){softNote(f(p.b[i]-12),bt,sw(i)*1.1,‘sine’,0.12,false);bt+=sw(i);}
// Warm chord pads — triangle, very quiet, long sustain on beats 1&3
[0,2].forEach(beat=>{const ct=t+beat*B;p.ch.forEach(n=>softNote(f(n),ct,B*1.8,‘triangle’,0.009,true));});
// Gentle piano melody — triangle with reverb
bt=t;
for(let i=0;i<8;i++){if(Math.random()>.25)softNote(f(p.mel[i]),bt,sw(i)*1.2,‘triangle’,0.038,true);bt+=sw(i);}
// Brushed hi-hat — barely there
for(let i=0;i<8;i++){const ht=t+i*B/2;softNote(f(6000+rand(-400,400)),ht,0.025,‘sine’,0.004,false);}
// Soft kick on 1, brush on 3
softNote(f(55),t,0.18,‘sine’,0.055,false);
softNote(f(80),t+2*B,0.12,‘sine’,0.035,false);
}
function tick(){
if(!playing||!ac)return;
while(nextBar<ac.currentTime+2.0){schedBar(nextBar,barIdx);nextBar+=B*8;barIdx++;}
setTimeout(tick,400);
}
return{
start(){
if(playing)return;
try{
ac=new(window.AudioContext||window.webkitAudioContext)();
master=ac.createGain();master.gain.value=0.28;master.connect(ac.destination);
reverb=mkRev();
playing=true;nextBar=ac.currentTime+0.05;barIdx=0;tick();
}catch(e){}
},
hit(big){
if(!ac)return;const t=ac.currentTime;
const o=ac.createOscillator(),g=ac.createGain();o.type=‘triangle’;
o.frequency.setValueAtTime(big?120:260,t);o.frequency.exponentialRampToValueAtTime(big?25:50,t+0.18);
g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.28);
},
note(mi,vol){
if(!ac)return;const t=ac.currentTime;
const o=ac.createOscillator(),g=ac.createGain();o.type=‘triangle’;o.frequency.value=f(mi);
g.gain.setValueAtTime(vol||0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.5);
},
strum(){
if(!ac)return;const t=ac.currentTime;
[60,64,67,71,74].forEach((n,i)=>{
const o=ac.createOscillator(),g=ac.createGain();o.type=‘triangle’;o.frequency.value=f(n);
g.gain.setValueAtTime(0,t+i*0.03);g.gain.linearRampToValueAtTime(0.1,t+i*0.03+0.02);
g.gain.exponentialRampToValueAtTime(0.001,t+i*0.03+0.6);
o.connect(g);g.connect(ac.destination);o.start(t+i*0.03);o.stop(t+i*0.03+0.7);
});
},
drum(freq,vol){
if(!ac)return;const t=ac.currentTime;
const o=ac.createOscillator(),g=ac.createGain();o.type=‘sine’;
o.frequency.setValueAtTime(freq||80,t);o.frequency.exponentialRampToValueAtTime(20,t+0.12);
g.gain.setValueAtTime(vol||0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.2);
},
laugh(){
if(!ac)return;const t=ac.currentTime;
[0,.07,.14,.21].forEach((off,i)=>{
const o=ac.createOscillator(),g=ac.createGain();o.type=‘sine’;
o.frequency.value=f(60+i*4);g.gain.setValueAtTime(0.08,t+off);
g.gain.exponentialRampToValueAtTime(0.001,t+off+0.09);
o.connect(g);g.connect(ac.destination);o.start(t+off);o.stop(t+off+0.12);
});
},
super(){
if(!ac)return;const t=ac.currentTime;
[48,52,55,60,64].forEach((n,i)=>{
const o=ac.createOscillator(),g=ac.createGain();o.type=‘triangle’;o.frequency.value=f(n);
g.gain.setValueAtTime(0.12,t+i*0.06);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.6);
o.connect(g);g.connect(ac.destination);o.start(t+i*0.06);o.stop(t+i*0.06+0.7);
});
}
};
})();

// ══════════════════════════════════════════════════════
//  DRAW UTILS
// ══════════════════════════════════════════════════════
function fuzzy(ctx,x,y,r,col,n=18,fuzz=4){
ctx.fillStyle=col;ctx.beginPath();
for(let i=0;i<=n;i++){const a=i/n*Math.PI*2,fr=r+Math.sin(i*6.3+x*.3)*fuzz*(i%2?1:-1);
i===0?ctx.moveTo(x+Math.cos(a)*fr,y+Math.sin(a)*fr):ctx.lineTo(x+Math.cos(a)*fr,y+Math.sin(a)*fr);}
ctx.closePath();ctx.fill();
}
function rGrad(ctx,x,y,r,c1,c2){const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
function lGrad(ctx,x1,y1,x2,y2,c1,c2){const g=ctx.createLinearGradient(x1,y1,x2,y2);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
function star(ctx,x,y,r1,r2,pts,col){
ctx.fillStyle=col;ctx.beginPath();
for(let i=0;i<pts*2;i++){const a=i/pts*Math.PI-Math.PI/2,r=i%2?r2:r1;i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}
ctx.closePath();ctx.fill();
}

// ══════════════════════════════════════════════════════
//  WEAPONS
// ══════════════════════════════════════════════════════
function drawBanjo(ctx,x,y,angle,strum){
ctx.save();ctx.translate(x,y);ctx.rotate(angle);
ctx.fillStyle=lGrad(ctx,-3,-65,3,-10,’#7a3a10’,’#b05020’);ctx.fillRect(-4,-66,8,70);
ctx.fillStyle=’#888’;[-4,4].forEach(px=>{[-68,-60,-52].forEach(py=>{ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();});});
ctx.fillStyle=rGrad(ctx,-4,4,24,’#f0b830’,’#c07010’);ctx.beginPath();ctx.arc(0,4,24,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=’#7a4000’;ctx.lineWidth=2;ctx.stroke();
ctx.fillStyle=’#3a1a00’;ctx.beginPath();ctx.arc(0,4,8,0,Math.PI*2);ctx.fill();
ctx.fillStyle=’#5a2a00’;ctx.fillRect(-10,12,20,3);
ctx.strokeStyle=‘rgba(255,255,200,0.65)’;ctx.lineWidth=0.8;
for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-3+i*2,-62);ctx.lineTo(-3+i*2,14);ctx.stroke();}
if(strum){ctx.strokeStyle=’#ffff00’;ctx.lineWidth=1.5;for(let i=0;i<5;i++){const a=rand(-.5,.5),len=rand(10,22);ctx.beginPath();ctx.moveTo(14,rand(-8,20));ctx.lineTo(14+Math.cos(a)*len,rand(-8,20)+Math.sin(a)*len);ctx.stroke();}}
ctx.restore();
}
function drawDrumstick(ctx,x,y,angle,col){
ctx.save();ctx.translate(x,y);ctx.rotate(angle);
ctx.fillStyle=col||’#c8822a’;ctx.fillRect(-3,-50,6,50);
ctx.fillStyle=’#f0e0c0’;ctx.beginPath();ctx.ellipse(0,-52,6,8,0,0,Math.PI*2);ctx.fill();
ctx.restore();
}
function drawRubberChicken(ctx,x,y,angle){
ctx.save();ctx.translate(x,y);ctx.rotate(angle);
ctx.fillStyle=’#f5c518’;ctx.beginPath();ctx.ellipse(0,-24,9,20,0,0,Math.PI*2);ctx.fill(); // body
ctx.beginPath();ctx.ellipse(2,-46,7,12,.2,0,Math.PI*2);ctx.fill(); // neck
ctx.fillStyle=’#ff8800’;ctx.beginPath();ctx.ellipse(4,-58,10,8,.3,0,Math.PI*2);ctx.fill(); // head
ctx.fillStyle=’#ff4400’;ctx.beginPath();ctx.moveTo(0,-54);ctx.lineTo(-8,-52);ctx.lineTo(-4,-58);ctx.fill(); // beak
ctx.fillStyle=’#111’;ctx.beginPath();ctx.arc(7,-56,2,0,Math.PI*2);ctx.fill(); // eye
ctx.fillStyle=’#f5c518’;ctx.beginPath();ctx.ellipse(-10,-16,6,12,-.4,0,Math.PI*2);ctx.fill(); // wing
ctx.restore();
}

// ══════════════════════════════════════════════════════
//  CHARACTER ART  (feet at 0,0 facing right)
// ══════════════════════════════════════════════════════
function drawKerminal(ctx,state,t){
const b=state===‘idle’?Math.sin(t*.09)*3:0,wk=state===‘walk’?Math.sin(t*.14):0,hurt=state===‘hurt’;
const G=’#2db82d’,GD=’#1a6e1a’,GL=’#55dd55’,GH=’#aaffaa’,W=’#fff’,K=’#111’;
// Shadow
ctx.fillStyle=‘rgba(0,0,0,.22)’;ctx.beginPath();ctx.ellipse(0,6,32,7,0,0,Math.PI*2);ctx.fill();
// Webbed feet
const footFn=(fx,flip)=>{ctx.save();ctx.translate(fx,4);if(flip)ctx.scale(-1,1);
ctx.fillStyle=GD;ctx.beginPath();ctx.moveTo(-6,0);ctx.bezierCurveTo(-18,-2,-22,8,-14,8);ctx.bezierCurveTo(-8,8,0,6,6,8);ctx.bezierCurveTo(14,10,20,4,16,0);ctx.bezierCurveTo(10,-2,2,-1,-6,0);ctx.fill();
ctx.fillStyle=G;ctx.beginPath();ctx.moveTo(-5,0);ctx.bezierCurveTo(-16,-1,-20,7,-12,7);ctx.bezierCurveTo(-6,7,0,5,5,7);ctx.bezierCurveTo(12,9,18,3,14,0);ctx.closePath();ctx.fill();
ctx.restore();};
footFn(-14,false);footFn(14,true);
// Legs
ctx.fillStyle=GD;ctx.save();ctx.translate(-9,0);ctx.rotate(wk*.4);ctx.fillRect(-4,-18+b,8,18);ctx.restore();
ctx.save();ctx.translate(9,0);ctx.rotate(-wk*.4);ctx.fillRect(-4,-18+b,8,18);ctx.restore();
// Body - wider, rounder frog body
const by=-52+b;
const bg=ctx.createRadialGradient(-8,by-10,4,0,by,32);bg.addColorStop(0,GL);bg.addColorStop(.6,G);bg.addColorStop(1,GD);
ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,by,30,36,0,0,Math.PI*2);ctx.fill();
// Lighter belly
ctx.fillStyle=’#c8f5c8’;ctx.beginPath();ctx.ellipse(1,by+4,18,24,0,0,Math.PI*2);ctx.fill();
// White collar
ctx.fillStyle=W;ctx.beginPath();ctx.ellipse(0,by+30,22,10,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=’#ddd’;ctx.strokeStyle=’#ccc’;ctx.lineWidth=1;ctx.stroke();
// Arms
const atkA=state===‘attack_A’,atkB=state===‘attack_B’,atkC=state===‘attack_C’;
if(atkA){// STRUM WAVE — arm thrust forward with banjo
const ag=ctx.createLinearGradient(-8,by,40,by);ag.addColorStop(0,GD);ag.addColorStop(1,GL);
ctx.fillStyle=ag;ctx.save();ctx.translate(0,by-6);ctx.rotate(-.12);ctx.beginPath();ctx.roundRect(12,-7,42,13,6);ctx.fill();ctx.restore();
drawBanjo(ctx,56,by+2,.25,true);
// Speed lines
ctx.strokeStyle=‘rgba(100,255,100,.55)’;ctx.lineWidth=2;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(20+i*6,by-24);ctx.lineTo(26+i*6,by+4);ctx.stroke();}
} else if(atkB){// BANJO BONK — overhead
ctx.fillStyle=GL;ctx.save();ctx.translate(12,by-14);ctx.rotate(-.5);ctx.beginPath();ctx.roundRect(0,-10,10,32,5);ctx.fill();ctx.restore();
drawBanjo(ctx,24,by-52,-2.0,false);
ctx.strokeStyle=‘rgba(255,255,0,.6)’;ctx.lineWidth=3;for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(24,by-52,8+i*8,-.8,.8);ctx.stroke();}
} else if(atkC){// RIBBIT KICK — flying kick
ctx.fillStyle=GD;ctx.save();ctx.translate(0,by+10);ctx.rotate(-.42);ctx.fillRect(10,-10,54,16);ctx.restore();
footFn(62,-10+b);
ctx.save();ctx.globalAlpha=.5;ctx.strokeStyle=’#88ff88’;ctx.lineWidth=3;[0,.4,.8].forEach(i=>{ctx.beginPath();ctx.arc(62,-10+b,10+i*12,-.6,.6);ctx.stroke();});ctx.restore();
drawBanjo(ctx,-20,by-8,Math.PI*.45,false);
} else if(hurt){
ctx.fillStyle=GD;ctx.save();ctx.translate(-22,by);ctx.rotate(.65);ctx.beginPath();ctx.roundRect(-4,-4,9,28,4);ctx.fill();ctx.restore();
ctx.save();ctx.translate(22,by);ctx.rotate(-.65);ctx.beginPath();ctx.roundRect(-4,-4,9,28,4);ctx.fill();ctx.restore();
drawBanjo(ctx,-18,by-8,Math.PI*.3,false);
} else {
const as=wk*.28;ctx.fillStyle=G;
ctx.save();ctx.translate(-22,by-2);ctx.rotate(as+.28);ctx.beginPath();ctx.roundRect(-4,-4,9,28,4);ctx.fill();ctx.restore();
ctx.save();ctx.translate(22,by-2);ctx.rotate(-as-.28);ctx.beginPath();ctx.roundRect(-4,-4,9,28,4);ctx.fill();ctx.restore();
drawBanjo(ctx,24,by-2,-.28,false);
}
// HEAD — key Kermit feature: wide, flat frog head
const hy=-90+b;
const hg=ctx.createRadialGradient(-6,hy-6,4,0,hy,34);hg.addColorStop(0,GL);hg.addColorStop(.55,G);hg.addColorStop(1,GD);
ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(0,hy,32,26,0,0,Math.PI*2);ctx.fill();
ctx.strokeStyle=GD;ctx.lineWidth=1.5;ctx.stroke();
// Kermit’s iconic HUGE wide mouth — almost wraps around to sides
ctx.fillStyle=’#2d1a00’;ctx.beginPath();

//  PROJECTILE SYSTEM
// ══════════════════════════════════════════════════════
let PROJS=[];
class BasicProj{
constructor(owner,x,y,vx,vy,dmg,type){this.owner=owner;this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.dmg=dmg;this.type=type;this.life=3;this.hit=false;this.t=0;this.bounced=false;}
update(dt,enemy){
this.t+=dt;this.life-=dt;this.x+=this.vx;this.y+=this.vy;
if(this.type!==‘stench’)this.vy+=0.08;
// Oscar’s I LOVE TRASH: trash bounces off screen edges once
if(this.type===‘trash’&&!this.bounced&&(this.x<20||this.x>W-20)){this.vx*=-0.9;this.bounced=true;}
if(!this.hit){
const hitR=(this.type===‘stench’)?52:32,hitH=(this.type===‘stench’)?62:54;
const dx=Math.abs(enemy.x-this.x),dy=Math.abs((enemy.y-enemy.data.h/2)-this.y);
if(dx<hitR&&dy<hitH){
this.hit=true;
// Fuzzybear PIE FACE: pie stun +50%
let hs=18;
if(this.type===‘pie’||this.type===‘fish’)hs=this.owner.data.atk.B.hs*1.5;
if(this.type===‘pie’&&this.owner.data.id===‘fuzzybear’)hs*=1.5;
if(this.type===‘stench’)hs=24;
enemy.takeDmg(this.dmg,{x:Math.sign(this.vx||1)*5,y:-2},Math.round(hs));
FX.hitSpark(this.x,this.y,this.type===‘stench’);JAZZ.hit(this.type===‘stench’);
}
}
return this.life>0&&this.x>-120&&this.x<W+120&&this.y<H+100;
}
draw(ctx){
ctx.save();ctx.translate(this.x,this.y);
if(this.type===‘wave’){ctx.strokeStyle=`rgba(255,230,0,${Math.min(1,this.life)})`;ctx.lineWidth=3;for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,0,(i+1)*10+Math.sin(this.t*8)*4,-.8,.8);ctx.stroke();}ctx.fillStyle=’#ffff00’;ctx.font=‘bold 18px sans-serif’;ctx.textAlign=‘center’;ctx.fillText(‘♪’,0,6);}
else if(this.type===‘bigwave’){ctx.strokeStyle=`rgba(255,210,0,${Math.min(1,this.life)})`;ctx.lineWidth=5;for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(0,0,(i+1)*14+Math.sin(this.t*10)*6,-.9,.9);ctx.stroke();}ctx.fillStyle=’#ffdd00’;ctx.font=‘bold 24px sans-serif’;ctx.textAlign=‘center’;ctx.fillText(‘♫’,0,9);}
else if(this.type===‘concert’){ctx.globalAlpha=Math.min(1,this.life*.8);ctx.strokeStyle=’#ffcc00’;ctx.lineWidth=6;for(let i=0;i<7;i++){ctx.beginPath();ctx.arc(0,0,(i+1)*18+Math.sin(this.t*12)*5,-.6,.6);ctx.stroke();}ctx.fillStyle=’#ffff00’;ctx.font=‘bold 28px sans-serif’;ctx.textAlign=‘center’;ctx.fillText(‘♬’,0,10);}
else if(this.type===‘cookie’){ctx.fillStyle=’#cc6611’;ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();ctx.fillStyle=’#ff9933’;ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();ctx.fillStyle=’#663300’;[[-2,-3],[4,-2],[-1,4],[5,3]].forEach(([px,py])=>{ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();});}

//  FIGHTER CLASS  (with combo input buffer)
// ══════════════════════════════════════════════════════
class Fighter{
constructor(data,side){
this.data=data;this.side=side;

this.vx=0;this.vy=0;this.facing=side===0?1:-1;
this.hp=data.hp;this.maxHp=data.hp;this.meter=0;
this.state=‘idle’;this.atkKey=null;this.atkFrame=0;this.atkTotal=0;
this.hitstunF=0;this.invinF=0;this.onGround=true;
this.fr=0;this.comboCount=0;this.comboTimer=0;this.lastHitT=0;
this.lastS=0;this.dead=false;this.hitSet=new Set();this.shieldUsed=false;
this.usedDblJump=false;this.projSpawned=false;
// Combo buffer: stores {key, t} for recent button presses
this.cbuf=[];this.cbufWindow=0.44; // seconds between inputs

}
getHurtbox(){return{x:this.x-22,y:this.y-this.data.h,w:44,h:this.data.h};}
getHitbox(){
if(!this.atkKey)return null;
// Combo active-phase hitbox
if(this.activeCombo){
const c=this.activeCombo;
if(this.atkFrame<c.su||this.atkFrame>=c.su+c.a)return null;

return{x:f>0?this.x+4:this.x-4-reach,y:this.y+(c.ry||-70),w:reach,h:c.rh||30,atk:c,key:‘COMBO’};
}
const atk=this.data.atk[this.atkKey];if(!atk||atk.proj)return null;
const{su,a}=atk;if(this.atkFrame<su||this.atkFrame>=su+a)return null;
const f=this.facing,reach=atk.reach||60;
return{x:f>0?this.x+4:this.x-4-reach,y:this.y+(atk.ry||-70),w:reach,h:atk.rh||30,atk,key:this.atkKey};
}
// Check if recent buffer matches a combo sequence
checkCombo(newKey,now){
const combos=this.data.combos;if(!combos)return null;
// Prune stale entries
this.cbuf=this.cbuf.filter(e=>now-e.t<this.cbufWindow*1000);

for(const c of combos){

const tail=this.cbuf.slice(-L);
if(tail.every((e,i)=>e.key===seq[i])){

if(now-tail[0].t<this.cbufWindow*1000*(L-1)){
this.cbuf=[];return c;
}
}
}

}
startCombo(c,opponent){
this.activeCombo=c;this.atkKey=‘COMBO’;this.atkFrame=0;
this.atkTotal=c.su+c.a+c.rc;this.hitSet=new Set();this.projSpawned=false;
this.comboHitCount=0;this.comboHitTimer=0;
this.state=‘attack’;
FX.superFlash(c.col||this.data.color);
FX.screenShake(4);
FX.addText(this.x,this.y-this.data.h-48,c.name,c.col||’#ffff00’,20);

startAtk(key,opponent){

this.activeCombo=null;
this.state=‘attack’;this.atkKey=key;this.atkFrame=0;
this.atkTotal=atk.su+atk.a+atk.rc;this.hitSet=new Set();this.projSpawned=false;
if(key===‘SU’||key===‘SP’){FX.special(this.x,this.y-60,this.data.color);}

}

if(this.invinF>0)return false;

if(this.state===‘attack’&&this.atkKey===‘C’&&this.data.id===‘missswine’)return false;

}

if(this.comboTimer>0){this.comboTimer-=dt;if(this.comboTimer<=0)this.comboCount=0;}

} else {
const atk=this.data.atk[this.atkKey];
if(atk&&atk.proj&&!this.projSpawned&&this.atkFrame>=atk.su){spawnProj(this,this.atkKey,atk,opponent);this.projSpawned=true;}
if(this.atkFrame>=this.atkTotal){this.state=‘idle’;this.atkKey=null;}
}
}
this.vy+=GRAV;
if(this.data.id===‘bigyella’&&!this.onGround&&this.vy>2)this.vy=Math.min(this.vy,2.5);
this.x+=this.vx;this.y+=this.vy;
if(this.vx>0)this.vx=Math.max(0,this.vx-.38);else if(this.vx<0)this.vx=Math.min(0,this.vx+.38);
if(this.y>=FLOOR){this.y=FLOOR;this.vy=0;this.onGround=true;this.usedDblJump=false;if(this.state===‘jump’)this.state=‘idle’;}else this.onGround=false;
this.x=clamp(this.x,50,W-50);
if(this.data.id===‘elmo’&&!this.dead&&this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+dt*.5);
if(this.state!==‘hurt’){

if(canAtk||canMove){
if(input.dir.x!==0&&canAtk){this.x+=input.dir.x*this.data.speed;if(this.onGround)this.state=‘walk’;}
else if(this.onGround&&this.state===‘walk’&&!input.dir.x)this.state=‘idle’;
if(input.dir.y<0&&this.onGround){this.vy=-this.data.jForce;this.onGround=false;this.state=‘jump’;JAZZ.note(72,.05);}
else if(input.dir.y<0&&!this.onGround&&!this.usedDblJump&&this.data.id===‘kerminal’){this.vy=-this.data.jForce*.82;this.usedDblJump=true;FX.special(this.x,this.y-40,’#3ecb3e’);JAZZ.note(76,.06);}
if(this.data.id===‘bigyella’&&!this.onGround&&input.dir.x!==0)this.x+=input.dir.x*1.5;
}
if(canAtk){
const now=Date.now();
if(input.jp.A||input.jp.B||input.jp.C){
const pressedKey=input.jp.A?‘A’:input.jp.B?‘B’:‘C’;
const combo=this.checkCombo(pressedKey,now);
if(combo){this.startCombo(combo,opponent);}

} else if(input.jp.S){

else this.startAtk(‘SP’,opponent);

draw(ctx){

class AI{
constructor(){this.timer=0;this.mode=‘approach’;}
reset(){this.timer=0;this.mode=‘approach’;}
update(fighter,opponent,dt){
const inp={dir:{x:0,y:0},jp:{A:0,B:0,C:0,S:0},btn:{A:0,B:0,C:0,S:0}};
if(fighter.dead||fighter.state===‘hurt’)return inp;
const dx=Math.abs(opponent.x-fighter.x),sign=Math.sign(opponent.x-fighter.x);
this.timer-=dt;
if(this.timer<=0){
const hp=fighter.hp/fighter.maxHp;
if(hp<.18&&fighter.meter>=100)this.mode=‘super’;
else if(dx<90)this.mode=Math.random()<.5?‘attack’:Math.random()<.4?‘retreat’:‘jump’;
else if(dx<250)this.mode=Math.random()<.22?‘jump’:‘approach’;
else this.mode=‘approach’;
this.timer=rand(.1,.55);
}
if(this.mode===‘approach’)inp.dir.x=sign;else if(this.mode===‘retreat’)inp.dir.x=-sign;else if(this.mode===‘jump’){inp.dir.x=sign;if(fighter.onGround)inp.dir.y=-1;}
else if(this.mode===‘attack’){if(dx<150){const r=Math.random();if(r<.28)inp.jp.A=1;else if(r<.52)inp.jp.B=1;else if(r<.68)inp.jp.C=1;else inp.jp.S=1;}else if(dx<320&&Math.random()<.18)inp.jp.A=1;else inp.dir.x=sign;}
else if(this.mode===‘super’){fighter.lastS=0;fighter.meter=100;inp.jp.S=1;}

}
}

// ══════════════════════════════════════════════════════
//  COMBAT
// ══════════════════════════════════════════════════════
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function doCombat(atk,def){
const hb=atk.getHitbox();if(!hb||atk.hitSet.has(def))return;
const hurt=def.getHurtbox();if(!overlap(hb,hurt)||def.invinF>0)return;
const a=hb.atk;
// Animal DRUM FURY: 40% extra damage below 40% HP
let dmg=a.d;if(atk.data.id===‘animal’&&atk.hp/atk.maxHp<.4)dmg=Math.floor(dmg*1.4);
const hit=def.takeDmg(dmg,a.kb,a.hs);
if(hit){
atk.hitSet.add(def);atk.meter=Math.min(MMAX,atk.meter+a.d*.18);

let GAMEMODE=‘arcade’; // ‘arcade’ | ‘survival’ | ‘story’
let STATE=‘title’;let gameT=0,titleT=0,vsT=0;
let p1=null,p2=null,ai=new AI();
let stage=0,roundTimer=60,round=1,p1Wins=0,p2Wins=0;
let roundOverTimer=0;let msgText=’’,msgCol=’#fff’,msgSize=52,msgTimer=0;
function showMsg(t,c,s,d){msgText=t;msgCol=c||’#fff’;msgSize=s||52;msgTimer=d||1.2;}

// SURVIVAL state
const SURV={wave:1,score:0,streak:0,best:0,waveTimer:0,waveClearing:false,waveClearTimer:0,totalKOs:0};
function survDifficulty(){return Math.min(3,1+SURV.wave*.22);}
function survOpponent(heroId){
const pool=ALL.filter(id=>id!==heroId);
// Weight harder fighters at higher waves
return pool[Math.floor(Math.random()*pool.length)];
}
function survHPRestore(){if(p1){p1.hp=Math.min(p1.maxHp,p1.hp+Math.max(30,60-SURV.wave*3));}}

// STORY state
const STOR={charId:null,chapter:0,phase:‘intro’,sceneT:0,dialogLine:0,retrying:false};
function storyCurrent(){return STORIES[STOR.charId]?.chapters[STOR.chapter]||null;}
function storyBeginChapter(){
const ch=storyCurrent();if(!ch)return;
const hero=CHARS[STOR.charId],opp=CHARS[ch.opp];
p1=new Fighter(hero,0);p2=new Fighter(opp,1);
stage=ch.st||0;PROJS=[];FX.parts=[];FX.flashA=0;
p1Wins=0;p2Wins=0;round=1;roundTimer=99;roundOverTimer=0;
ai.reset();vsT=0;STATE=‘vs’;
}
function storyNextChapter(){
STOR.chapter++;STOR.phase=‘intro’;STOR.sceneT=0;STOR.dialogLine=0;
if(STOR.chapter>=STORIES[STOR.charId].chapters.length){STATE=‘story_win’;gameT=0;}
else{STATE=‘story_scene’;}
}

// Menu cursor
let menuCursor=0; // 0=arcade 1=survival 2=story

function beginSelectStage(charId){
JAZZ.start();
const ch=CHARS[charId];
const oppPool=ch.team===‘muppets’?SESAME:MUPPET;

}
function startFight(){

}

}

function survStartWave(){
const oppId=survOpponent(p1.data.id);
const d1=p1.data;p1=new Fighter(d1,0);p1.hp=Math.min(d1.hp,p1.hp);// preserve HP

}

// Patch AI.update to support difficulty param
{
const _orig=AI.prototype.update;
AI.prototype.update=function(fighter,opponent,dt,difficulty=1){
// difficulty 1–3: higher = more aggressive, faster decisions
const inp=_orig.call(this,fighter,opponent,dt);
// Ramp up: harder AI makes more aggressive mode choices
if(difficulty>1&&this.timer<=0){
const dx=Math.abs(opponent.x-fighter.x);
const aggr=Math.random()<(difficulty-1)*.35;
if(aggr&&dx<180&&this.mode!==‘super’){this.mode=‘attack’;this.timer=rand(.08,.25);}
}
return inp;
};
}

if(STATE===‘menu’){const cW=200,gap=24,total=3*(cW+gap)-gap,sx2=(W-total)/2;for(let i=0;i<3;i++){const cx=sx2+i*(cW+gap);if(p.x>=cx&&p.x<=cx+cW&&p.y>=130&&p.y<=330){menuCursor=i;return;}}}
if(STATE===‘select’){for(let i=0;i<ALL.length;i++){const{x,y,w,h}=gridPos(i);if(p.x>=x&&p.x<=x+w&&p.y>=y&&p.y<=y+h){selectCursor=i;return;}}}
if(STATE===‘stagesel’){const cW=136,gap=8,total=STAGES.length*(cW+gap)-gap,startX=(W-total)/2;for(let i=0;i<STAGES.length;i++){const cx=startX+i*(cW+gap);if(p.x>=cx&&p.x<=cx+cW&&p.y>=70&&p.y<=210){stageCursor=i;return;}}}
});
addEventListener(‘keydown’,e=>{
JAZZ.start();
if(STATE===‘title’){STATE=‘menu’;menuCursor=0;gameT=0;e.preventDefault();return;}
if(STATE===‘menu’){
if(e.code===‘ArrowRight’||e.code===‘KeyD’){menuCursor=(menuCursor+1)%3;}
else if(e.code===‘ArrowLeft’||e.code===‘KeyA’){menuCursor=(menuCursor+2)%3;}
else if(e.code===‘KeyZ’||e.code===‘Enter’){GAMEMODE=[‘arcade’,‘survival’,‘story’][menuCursor];selectCursor=0;STATE=‘select’;gameT=0;}
e.preventDefault();return;
}
if(STATE===‘select’){
const n=ALL.length;
if(e.code===‘ArrowRight’||e.code===‘KeyD’)selectCursor=(selectCursor+1)%n;
else if(e.code===‘ArrowLeft’||e.code===‘KeyA’)selectCursor=(selectCursor-1+n)%n;
else if(e.code===‘ArrowDown’||e.code===‘KeyS’)selectCursor=Math.min(n-1,selectCursor+5);
else if(e.code===‘ArrowUp’||e.code===‘KeyW’)selectCursor=Math.max(0,selectCursor-5);
else if(e.code===‘KeyZ’||e.code===‘Enter’){
const charId=ALL[selectCursor];
if(GAMEMODE===‘arcade’)beginSelectStage(charId);
else if(GAMEMODE===‘survival’)survBegin(charId);
else if(GAMEMODE===‘story’)storyBegin(charId);
}
e.preventDefault();return;
}
if(STATE===‘stagesel’){
const n=STAGES.length;
if(e.code===‘ArrowRight’||e.code===‘KeyD’)stageCursor=(stageCursor+1)%n;
else if(e.code===‘ArrowLeft’||e.code===‘KeyA’)stageCursor=(stageCursor-1+n)%n;
else if(e.code===‘KeyZ’||e.code===‘Enter’)startFight();
e.preventDefault();return;
}
if(STATE===‘story_scene’){
const ch=storyCurrent();const lines=ch?.d||[];
if(e.code===‘KeyZ’||e.code===‘Enter’||e.code===‘Space’){
if(STOR.dialogLine<lines.length-1){STOR.dialogLine++;STOR.sceneT=0;gameT=0;}
else storyBeginChapter();
}
e.preventDefault();return;
}
if(STATE===‘result’&&(e.code===‘Enter’||e.code===‘KeyZ’)){p1Wins=0;p2Wins=0;round=1;STATE=‘menu’;gameT=0;}
if(STATE===‘story_win’&&(e.code===‘Enter’||e.code===‘KeyZ’)){STATE=‘menu’;gameT=0;}
if(STATE===‘surv_over’&&(e.code===‘Enter’||e.code===‘KeyZ’)){STATE=‘menu’;gameT=0;}
});
requestAnimationFrame(loop);
</script>
