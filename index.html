const W=800,H=480,FLOOR=292,GRAV=0.62,MMAX=100;
const cv=document.getElementById('c'),C=cv.getContext('2d');
cv.width=W;cv.height=H;
C.imageSmoothingEnabled=false;
const snap=n=>Math.round(n);
const scl=()=>Math.min(innerWidth/W,innerHeight/H);
const resize=()=>{const s=scl();cv.style.width=W*s+'px';cv.style.height=H*s+'px';};
resize();addEventListener('resize',resize);
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='object'&&r)r=r[0]||0;
    r=Math.max(0,Math.min(r||0,Math.abs(w)/2,Math.abs(h)/2));
    if(r<0.5){this.rect(x,y,w,h);return this;}
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arc(x+w-r,y+r,r,-Math.PI/2,0);
    this.lineTo(x+w,y+h-r);
    this.arc(x+w-r,y+h-r,r,0,Math.PI/2);
    this.lineTo(x+r,y+h);
    this.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);
    this.lineTo(x,y+r);
    this.arc(x+r,y+r,r,Math.PI,Math.PI*1.5);
    this.closePath();return this;};
}

// ══════════════════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════════════════
const INP=(()=>{
  const DBTNS={up:{x:95,y:350},down:{x:95,y:440},left:{x:48,y:395},right:{x:142,y:395}};
  const DR=33;
  const ABTNS={A:{x:608,y:428},B:{x:668,y:384},C:{x:728,y:428},S:{x:668,y:456},X:{x:608,y:384}};
  const AR=37;
  let keys={},dir={x:0,y:0},btn={A:0,B:0,C:0,S:0,X:0},jp={A:0,B:0,C:0,S:0,X:0};
  let touchJp={A:0,B:0,C:0,S:0,X:0},prevBtn={A:0,B:0,C:0,S:0,X:0};
  let dT={},bT={},dA={up:0,down:0,left:0,right:0},bA={A:0,B:0,C:0,S:0,X:0};
  const toC=(cx,cy)=>{const s=scl(),r=cv.getBoundingClientRect();return{x:(cx-r.left)/s,y:(cy-r.top)/s};};
  const d2=(ax,ay,bx,by)=>(ax-bx)**2+(ay-by)**2;
  function gDP(px,py){let best=null,bd=DR*DR*1.5;for(const[k,p]of Object.entries(DBTNS)){const d=d2(px,py,p.x,p.y);if(d<bd){bd=d;best=k;}}return best;}
  function gAB(px,py){let best=null,bd=AR*AR*1.6;for(const[k,p]of Object.entries(ABTNS)){const d=d2(px,py,p.x,p.y);if(d<bd){bd=d;best=k;}}return best;}
  function rD(){dA={up:0,down:0,left:0,right:0};for(const d of Object.values(dT))dA[d]=1;}
  function rB(){bA={A:0,B:0,C:0,S:0,X:0};for(const b of Object.values(bT))bA[b]=1;}
  function clrT(id){if(id in dT){delete dT[id];rD();}if(id in bT){delete bT[id];rB();}}
  addEventListener('keydown',e=>{keys[e.code]=1;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
  addEventListener('keyup',e=>{keys[e.code]=0;});
  cv.addEventListener('touchstart',e=>{e.preventDefault();const fightOnly=['vs','fight'];if(!fightOnly.includes(STATE))return;for(const t of e.changedTouches){const p=toC(t.clientX,t.clientY),id=t.identifier;if(p.x<210){const d=gDP(p.x,p.y);if(d){dT[id]=d;rD();}}else{const b=gAB(p.x,p.y);if(b){bT[id]=b;touchJp[b]=1;rB();}}}},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){const p=toC(t.clientX,t.clientY),id=t.identifier;if(id in dT){const d=gDP(p.x,p.y);if(d&&d!==dT[id]){dT[id]=d;rD();}else if(!d){delete dT[id];rD();}}}},{passive:false});
  cv.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches)clrT(t.identifier);},{passive:false});
  cv.addEventListener('touchcancel',e=>{e.preventDefault();for(const t of e.changedTouches)clrT(t.identifier);},{passive:false});
  const DBTNS_ENTRIES=Object.entries(DBTNS),ABTNS_ENTRIES=Object.entries(ABTNS);
  return{DBTNS,ABTNS,DBTNS_ENTRIES,ABTNS_ENTRIES,DR,AR,get dir(){return dir;},get btn(){return btn;},get jp(){return jp;},get dA(){return dA;},get bA(){return bA;},
    update(){
      dir.x=(keys['ArrowRight']||keys['KeyD']?1:0)-(keys['ArrowLeft']||keys['KeyA']?1:0)||(dA.right?1:0)-(dA.left?1:0);
      dir.y=(keys['ArrowDown']||keys['KeyS']?1:0)-(keys['ArrowUp']||keys['KeyW']?1:0)||(dA.down?1:0)-(dA.up?1:0);
      const kb={A:keys['KeyZ']||keys['KeyJ']?1:0,B:keys['KeyX']||keys['KeyK']?1:0,C:keys['KeyC']||keys['KeyL']?1:0,S:keys['KeyV']||keys['Space']?1:0,X:keys['KeyQ']||keys['ShiftLeft']?1:0};
      for(const b of['A','B','C','S','X']){const was=prevBtn[b];btn[b]=Math.max(kb[b],bA[b]?1:0);jp[b]=(btn[b]&&!was)?1:0;if(touchJp[b]){jp[b]=1;touchJp[b]=0;}prevBtn[b]=btn[b];}
    }
  };
})();

// ══════════════════════════════════════════════════════
//  RELAXED LOUNGE JAZZ  (smooth, warm, ambient)
// ══════════════════════════════════════════════════════
const JAZZ=(()=>{
  let ac,master,reverb,playing=false,nextBar=0,barIdx=0;
  const BPM=80,B=60/BPM; // Slow, relaxed tempo
  const f=m=>440*2**((m-69)/12);
  // Gentle swing feel - very subtle
  const sw=i=>i%2===0?B/2*1.22:B/2*0.78;
  // Smooth Fmaj7 -> Dm9 -> Bbmaj7 -> C9 progression (warm & mellow)
  const PROG=[
    {b:[41,45,48,41,45,48,50,48],ch:[65,69,72,76,79],mel:[76,74,72,74,76,77,76,74]},// Fmaj9
    {b:[38,41,45,38,41,45,47,45],ch:[62,65,69,72,76],mel:[74,72,69,72,74,72,71,69]},// Dm9
    {b:[34,37,41,34,37,41,43,41],ch:[58,62,65,69,72],mel:[72,70,69,67,69,70,69,67]},// Bbmaj7
    {b:[36,40,43,36,40,43,45,43],ch:[60,64,67,71,74],mel:[69,67,65,67,69,71,72,71]},// C9
  ];
  // Simulated reverb via gain node with slight delay
  function mkRev(){
    if(!ac)return null;
    const delay=ac.createDelay(0.08);delay.delayTime.value=0.06;
    const g=ac.createGain();g.gain.value=0.18;
    delay.connect(g);g.connect(master);return delay;
  }
  function softNote(fr,t,dur,type,vol,useRev){
    if(!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.value=fr;
    // Warm detuning for richness
    if(type==='triangle')o.detune.value=rand(-3,3);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.08); // Soft attack
    g.gain.setValueAtTime(vol,t+dur*0.55);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.12); // Long gentle decay
    o.connect(g);g.connect(master);
    if(useRev&&reverb){const rv=ac.createGain();rv.gain.value=0.2;g.connect(rv);rv.connect(reverb);}
    o.start(t);o.stop(t+dur+0.25);
  }
  function schedBar(t,bi){
    const p=PROG[bi%4];
    // Soft upright bass - sine wave, mellow
    let bt=t;
    for(let i=0;i<8;i++){softNote(f(p.b[i]-12),bt,sw(i)*1.1,'sine',0.12,false);bt+=sw(i);}
    // Warm chord pads - triangle, very quiet, long sustain on beats 1&3
    [0,2].forEach(beat=>{const ct=t+beat*B;p.ch.forEach(n=>softNote(f(n),ct,B*1.8,'triangle',0.009,true));});
    // Gentle piano melody - triangle with reverb
    bt=t;
    for(let i=0;i<8;i++){if(Math.random()>.25)softNote(f(p.mel[i]),bt,sw(i)*1.2,'triangle',0.038,true);bt+=sw(i);}
    // Brushed hi-hat - barely there
    for(let i=0;i<8;i++){const ht=t+i*B/2;softNote(f(6000+rand(-400,400)),ht,0.025,'sine',0.004,false);}
    // Soft kick on 1, brush on 3
    softNote(f(55),t,0.18,'sine',0.055,false);
    softNote(f(80),t+2*B,0.12,'sine',0.035,false);
  }
  function tick(){
    if(!playing||!ac)return;
    while(nextBar<ac.currentTime+2.0){schedBar(nextBar,barIdx);nextBar+=B*8;barIdx++;}
    setTimeout(tick,400);
  }
  return{
    start(){
      if(playing)return;
      try{
        ac=new(window.AudioContext||window.webkitAudioContext)();
        master=ac.createGain();master.gain.value=0.28;master.connect(ac.destination);
        reverb=mkRev();
        playing=true;nextBar=ac.currentTime+0.05;barIdx=0;tick();
      }catch(e){}
    },
    hit(big){
      if(!ac)return;const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';
      o.frequency.setValueAtTime(big?120:260,t);o.frequency.exponentialRampToValueAtTime(big?25:50,t+0.18);
      g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.28);
    },
    note(mi,vol){
      if(!ac)return;const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f(mi);
      g.gain.setValueAtTime(vol||0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.5);
    },
    strum(){
      if(!ac)return;const t=ac.currentTime;
      [60,64,67,71,74].forEach((n,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f(n);
        g.gain.setValueAtTime(0,t+i*0.03);g.gain.linearRampToValueAtTime(0.1,t+i*0.03+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+i*0.03+0.6);
        o.connect(g);g.connect(ac.destination);o.start(t+i*0.03);o.stop(t+i*0.03+0.7);
      });
    },
    drum(freq,vol){
      if(!ac)return;const t=ac.currentTime;
      const o=ac.createOscillator(),g=ac.createGain();o.type='sine';
      o.frequency.setValueAtTime(freq||80,t);o.frequency.exponentialRampToValueAtTime(20,t+0.12);
      g.gain.setValueAtTime(vol||0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
      o.connect(g);g.connect(ac.destination);o.start(t);o.stop(t+0.2);
    },
    laugh(){
      if(!ac)return;const t=ac.currentTime;
      [0,.07,.14,.21].forEach((off,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();o.type='sine';
        o.frequency.value=f(60+i*4);g.gain.setValueAtTime(0.08,t+off);
        g.gain.exponentialRampToValueAtTime(0.001,t+off+0.09);
        o.connect(g);g.connect(ac.destination);o.start(t+off);o.stop(t+off+0.12);
      });
    },
    super(){
      if(!ac)return;const t=ac.currentTime;
      [48,52,55,60,64].forEach((n,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f(n);
        g.gain.setValueAtTime(0.12,t+i*0.06);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.6);
        o.connect(g);g.connect(ac.destination);o.start(t+i*0.06);o.stop(t+i*0.06+0.7);
      });
    }
  };
})();

// ══════════════════════════════════════════════════════
//  DRAW UTILS
// ══════════════════════════════════════════════════════
function fuzzy(ctx,x,y,r,col,n=18,fuzz=4){
  ctx.fillStyle=col;ctx.beginPath();
  for(let i=0;i<=n;i++){const a=i/n*Math.PI*2,fr=r+Math.sin(i*6.3+x*.3)*fuzz*(i%2?1:-1);
    i===0?ctx.moveTo(x+Math.cos(a)*fr,y+Math.sin(a)*fr):ctx.lineTo(x+Math.cos(a)*fr,y+Math.sin(a)*fr);}
  ctx.closePath();ctx.fill();
}
function rGrad(ctx,x,y,r,c1,c2){const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
function lGrad(ctx,x1,y1,x2,y2,c1,c2){const g=ctx.createLinearGradient(x1,y1,x2,y2);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
function star(ctx,x,y,r1,r2,pts,col){
  ctx.fillStyle=col;ctx.beginPath();
  for(let i=0;i<pts*2;i++){const a=i/pts*Math.PI-Math.PI/2,r=i%2?r2:r1;i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);}
  ctx.closePath();ctx.fill();
}

// ══════════════════════════════════════════════════════
//  WEAPONS
// ══════════════════════════════════════════════════════
function drawBanjo(ctx,x,y,angle,strum){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=lGrad(ctx,-3,-65,3,-10,'#7a3a10','#b05020');ctx.fillRect(-4,-66,8,70);
  ctx.fillStyle='#888';[-4,4].forEach(px=>{[-68,-60,-52].forEach(py=>{ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();});});
  ctx.fillStyle=rGrad(ctx,-4,4,24,'#f0b830','#c07010');ctx.beginPath();ctx.arc(0,4,24,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#7a4000';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#3a1a00';ctx.beginPath();ctx.arc(0,4,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5a2a00';ctx.fillRect(-10,12,20,3);
  ctx.strokeStyle='rgba(255,255,200,0.65)';ctx.lineWidth=0.8;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-3+i*2,-62);ctx.lineTo(-3+i*2,14);ctx.stroke();}
  if(strum){ctx.strokeStyle='#ffff00';ctx.lineWidth=1.5;for(let i=0;i<5;i++){const a=rand(-.5,.5),len=rand(10,22);ctx.beginPath();ctx.moveTo(14,rand(-8,20));ctx.lineTo(14+Math.cos(a)*len,rand(-8,20)+Math.sin(a)*len);ctx.stroke();}}
  ctx.restore();
}
function drawDrumstick(ctx,x,y,angle,col){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=col||'#c8822a';ctx.fillRect(-3,-50,6,50);
  ctx.fillStyle='#f0e0c0';ctx.beginPath();ctx.ellipse(0,-52,6,8,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawRubberChicken(ctx,x,y,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle='#f5c518';ctx.beginPath();ctx.ellipse(0,-24,9,20,0,0,Math.PI*2);ctx.fill(); // body
  ctx.beginPath();ctx.ellipse(2,-46,7,12,.2,0,Math.PI*2);ctx.fill(); // neck
  ctx.fillStyle='#ff8800';ctx.beginPath();ctx.ellipse(4,-58,10,8,.3,0,Math.PI*2);ctx.fill(); // head
  ctx.fillStyle='#ff4400';ctx.beginPath();ctx.moveTo(0,-54);ctx.lineTo(-8,-52);ctx.lineTo(-4,-58);ctx.fill(); // beak
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(7,-56,2,0,Math.PI*2);ctx.fill(); // eye
  ctx.fillStyle='#f5c518';ctx.beginPath();ctx.ellipse(-10,-16,6,12,-.4,0,Math.PI*2);ctx.fill(); // wing
  ctx.restore();
}

// Pixel helpers
function pRect(ctx,x,y,w,h,col){ctx.fillStyle=col;ctx.fillRect(snap(x),snap(y),Math.max(1,snap(w)),Math.max(1,snap(h)));}
function pLine(ctx,x1,y1,x2,y2,col,lw){ctx.strokeStyle=col;ctx.lineWidth=lw||2;ctx.beginPath();ctx.moveTo(snap(x1),snap(y1));ctx.lineTo(snap(x2),snap(y2));ctx.stroke();}
function pBlock(ctx,pts,col){ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(snap(pts[0][0]),snap(pts[0][1]));for(let i=1;i<pts.length;i++)ctx.lineTo(snap(pts[i][0]),snap(pts[i][1]));ctx.closePath();ctx.fill();}
function pCirc(ctx,x,y,r,col){ctx.fillStyle=col;ctx.beginPath();ctx.arc(snap(x),snap(y),Math.max(1,snap(r)),0,Math.PI*2);ctx.fill();}
function pEye(ctx,x,y,iris,slit){pCirc(ctx,x,y,7,'#fffff0');pCirc(ctx,x,y,5,iris);pCirc(ctx,x+(slit?1:0),y,slit?2:3,'#111');pCirc(ctx,x-2,y-2,1.5,'rgba(255,255,255,.8)');}
function shadow(ctx,w){ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,5,w||24,6,0,0,Math.PI*2);ctx.fill();}
function atk(state){return{A:state==='attack_A',B:state==='attack_B',C:state==='attack_C',hurt:state==='hurt',walk:state==='walk',idle:state==='idle'};}
function bob(state,t,amt){return state==='idle'?Math.sin(t*.055)*amt:0;}

// ── 1. KERMINAL -> NIGHT FURY (Toothless-style) ─────────────────────────
// HTTYD: sleek, cat-like, flat wide head, retractable teeth, echolocation fins

// ═══════════════════════════════════════════════════════════════════
// PUPPET FIGHTERS CLASSIC - Superior Character Draw Functions
// Each character accurately represents their intended subject
// ═══════════════════════════════════════════════════════════════════

// ── KERMIT THE FROG ────────────────────────────────────────────────
function drawKerminal(ctx,state,t){
  const b=state==='idle'?Math.sin(t*.08)*3:0,wk=state==='walk'?Math.sin(t*.12):0,hurt=state==='hurt';
  const GR='#3ecb3e',GRD='#1a8c1a',GRL='#88ee88',W='#fffff0',K='#111',PK='#ffaacc';
  const s=atk(state),hy=-58+b;
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,5,28,6,0,0,Math.PI*2);ctx.fill();
  // Legs - thin frog legs
  ctx.fillStyle=GRD;
  ctx.save();ctx.translate(-10,0);ctx.rotate(wk*.45);ctx.fillRect(-3,-18+b,6,18);ctx.restore();
  ctx.save();ctx.translate(10,0);ctx.rotate(-wk*.45);ctx.fillRect(-3,-18+b,6,18);ctx.restore();
  // Frog feet - splayed
  for(const[fx,fa] of[[-12,.2],[12,-.2]]){
    ctx.fillStyle=GRD;ctx.save();ctx.translate(fx,4);ctx.rotate(fa+wk*(fx<0?.3:-.3));
    ctx.beginPath();ctx.ellipse(0,0,12,5,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  // Body - round oval
  fuzzy(ctx,0,hy+12,24,GRD,18,5);fuzzy(ctx,0,hy+12,20,GR,18,4);
  // White shirt/collar ruff - Kermit's signature
  ctx.fillStyle=W;ctx.beginPath();ctx.ellipse(0,hy+18,14,6,0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.arc(Math.cos(a)*10,hy+18+Math.sin(a)*4,5,0,Math.PI*2);ctx.fill();}
  // Arms
  const aL=hurt?-.5:s.A?.8:s.B?.6:s.C?.5:wk*.35;
  ctx.fillStyle=GRD;
  ctx.save();ctx.translate(-20,hy+8);ctx.rotate(aL);ctx.fillRect(-3,-3,6,16);ctx.restore();
  ctx.save();ctx.translate(20,hy+8);ctx.rotate(-aL*.7);ctx.fillRect(-3,-3,6,16);ctx.restore();
  // Banjo (idle) or attack effect
  if(!s.A&&!s.B&&!s.C){
    ctx.fillStyle='#cc9944';ctx.beginPath();ctx.ellipse(28,hy+10,7,7,0,0,Math.PI*2);ctx.fill();

  // Wind scar effects
  if(s.A){ctx.strokeStyle='rgba(180,220,255,.8)';ctx.lineWidth=2.5;for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(14,hy+8-i*4);ctx.quadraticCurveTo(60,hy+4-i*3,112,hy+8-i*4);ctx.stroke();}}
  if(s.B){ctx.fillStyle='rgba(160,210,255,.5)';ctx.beginPath();ctx.ellipse(44,hy+6,28,16,0,0,Math.PI*2);ctx.fill();}
  if(s.C){ctx.fillStyle='rgba(130,190,255,.45)';ctx.beginPath();ctx.ellipse(0,hy+22,44,18,0,0,Math.PI*2);ctx.fill();}
  // Elder HEAD - aged, wise face
  ctx.fillStyle=SK;ctx.beginPath();ctx.arc(0,hy,20,0,Math.PI*2);ctx.fill();
  // Big WHITE BEARD - elder's most obvious feature
  ctx.fillStyle=W;ctx.beginPath();ctx.moveTo(-14,hy+4);ctx.bezierCurveTo(-18,hy+18,-12,hy+32,0,hy+34);ctx.bezierCurveTo(12,hy+32,18,hy+18,14,hy+4);ctx.closePath();ctx.fill();
  ctx.fillStyle='#e0e0e0';for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(-8+i*4,hy+22+Math.sin(i*.6)*3,4+i%2*2,0,Math.PI*2);ctx.fill();}
  // White eyebrows - very bushy
  ctx.fillStyle=W;ctx.beginPath();ctx.moveTo(-16,hy-10);ctx.bezierCurveTo(-12,hy-18,-4,hy-16,0,hy-10);ctx.lineTo(0,hy-8);ctx.bezierCurveTo(-4,hy-14,-12,hy-15,-16,hy-8);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(16,hy-10);ctx.bezierCurveTo(12,hy-18,4,hy-16,0,hy-10);ctx.lineTo(0,hy-8);ctx.bezierCurveTo(4,hy-14,12,hy-15,16,hy-8);ctx.closePath();ctx.fill();
  // White topknot / bun
  ctx.fillStyle=W;ctx.beginPath();ctx.arc(0,hy-14,10,Math.PI,0);ctx.fill();
  ctx.beginPath();ctx.arc(0,hy-24,7,0,Math.PI*2);ctx.fill();
  // Narrow wise eyes
  ctx.fillStyle=W;ctx.beginPath();ctx.ellipse(-7,hy-4,5,3.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(7,hy-4,5,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#334455';ctx.beginPath();ctx.arc(-7,hy-4,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,hy-4,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=K;ctx.beginPath();ctx.arc(-6,hy-5,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(8,hy-5,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=K;ctx.lineWidth=1.5;ctx.beginPath();
  if(hurt)ctx.arc(0,hy+4,4,Math.PI,Math.PI*2);
  else{ctx.moveTo(-5,hy+6);ctx.quadraticCurveTo(0,hy+10,5,hy+6);}ctx.stroke();
  if(hurt){ctx.fillStyle='rgba(180,210,255,.25)';ctx.beginPath();ctx.ellipse(0,hy,22,20,0,0,Math.PI*2);ctx.fill();}
}

// ── PHANTOM ─────────────────────────────────────────────────────────
function drawPhantom(ctx,state,t){
  // THE PHANTOM — GOTENKS, base Metamoran fusion form (anime style)
  const b=state==='idle'?Math.sin(t*.08)*3:0,wk=state==='walk'?Math.sin(t*.16):0,hurt=state==='hurt';
  const SK='#f3c393',SKD='#d39a5e',SKH='#ffe0bc',
        BLK='#23232c',BLKH='#3c3c48',
        PUR='#9b6bd6',PURH='#bf95ea',
        GOLD='#ffce34',GOLDH='#ffe88c',GOLDD='#cf9500',
        PANT='#f6f6ef',PANTSH='#cdcdc2',PANTL='#ffffff',
        SASH='#1fa68c',SASHD='#13735f',
        BOOT='#744a28',BOOTD='#4d2f17',BOOTH='#9c6c40',
        GLV='#7d4c27',GLVD='#542f15',
        K='#15151c',W='#fff';
  const s=atk(state),hy=-74+b,OL=K;
  ctx.save();ctx.lineJoin='round';ctx.lineCap='round';

  // faint ghostly fusion aura (Phantom identity kept, subtle)
  const ag=ctx.createRadialGradient(0,-46+b,12,0,-46+b,56);
  ag.addColorStop(0,'rgba(150,110,220,.16)');ag.addColorStop(.6,'rgba(120,90,200,.07)');ag.addColorStop(1,'rgba(120,90,200,0)');
  ctx.fillStyle=ag;ctx.beginPath();ctx.ellipse(0,-46+b,52,62,0,0,Math.PI*2);ctx.fill();

  // ===== LEGS — white baggy Metamoran pants =====
  const lsw=wk*.34;
  for(const[side,ph] of[[-1,lsw],[1,-lsw]]){
    ctx.save();ctx.translate(side*9,-34+b);ctx.rotate(ph*.5);
    // baggy pant leg
    ctx.fillStyle=PANT;ctx.strokeStyle=OL;ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(-9,-2);ctx.lineTo(9,-2);
    ctx.lineTo(13,30);ctx.quadraticCurveTo(0,36,-13,30);ctx.closePath();
    ctx.fill();ctx.stroke();
    // pant shading + fold creases
    ctx.fillStyle=PANTSH;ctx.beginPath();ctx.moveTo(6*side,0);ctx.lineTo(11*side,28);ctx.lineTo(6*side,28);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(160,160,150,.7)';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(-3,4);ctx.lineTo(-5,26);ctx.moveTo(4,6);ctx.lineTo(5,24);ctx.stroke();
    ctx.restore();
  }
  // ===== BOOTS — brown martial-arts boots with fold cuff =====
  for(const[side,ph] of[[-1,lsw],[1,-lsw]]){
    ctx.save();ctx.translate(side*9+ph*8,2);ctx.rotate(ph*.3);
    ctx.fillStyle=BOOT;ctx.strokeStyle=OL;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-9,-14);ctx.lineTo(9,-14);ctx.lineTo(11,-2);
    ctx.quadraticCurveTo(11,4,16*side>0?15:15,4);
    ctx.lineTo(15,4);ctx.quadraticCurveTo(15,9,8,9);ctx.lineTo(-9,9);ctx.closePath();
    ctx.fill();ctx.stroke();
    // fold-over cuff
    ctx.fillStyle=BOOTH;ctx.beginPath();ctx.moveTo(-10,-14);ctx.lineTo(10,-14);ctx.lineTo(9,-6);ctx.lineTo(-10,-6);ctx.closePath();ctx.fill();ctx.strokeStyle=OL;ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=BOOTD;ctx.fillRect(-9,6,22,3);
    ctx.restore();
  }

  // ===== TORSO — black sleeveless fusion vest =====
  ctx.fillStyle=BLK;ctx.strokeStyle=OL;ctx.lineWidth=2.4;
  ctx.beginPath();
  ctx.moveTo(-15,hy+4);ctx.quadraticCurveTo(-19,hy+20,-14,hy+34);
  ctx.lineTo(14,hy+34);ctx.quadraticCurveTo(19,hy+20,15,hy+4);
  ctx.quadraticCurveTo(0,hy+10,-15,hy+4);ctx.closePath();
  ctx.fill();ctx.stroke();
  // vest center seam + chest shading
  ctx.fillStyle=BLKH;ctx.beginPath();ctx.moveTo(-13,hy+6);ctx.quadraticCurveTo(-15,hy+18,-11,hy+30);ctx.lineTo(-4,hy+30);ctx.quadraticCurveTo(-7,hy+16,-5,hy+7);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(0,hy+9);ctx.lineTo(0,hy+33);ctx.stroke();

  // ===== TEAL SASH with trailing tails =====
  ctx.fillStyle=SASHD;ctx.fillRect(-16,hy+31,32,9);
  ctx.fillStyle=SASH;ctx.fillRect(-16,hy+31,32,5);
  ctx.strokeStyle=OL;ctx.lineWidth=1.6;ctx.strokeRect(-16,hy+31,32,9);
  // knot
  ctx.fillStyle=SASH;ctx.strokeStyle=OL;ctx.beginPath();ctx.ellipse(-13,hy+36,6,7,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // flowing tails
  const tw=Math.sin(t*.12)*6;
  ctx.fillStyle=SASH;ctx.strokeStyle=OL;ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(-15,hy+38);
  ctx.quadraticCurveTo(-30,hy+48+tw,-26-tw,hy+66);
  ctx.quadraticCurveTo(-21,hy+60,-18,hy+44);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(-13,hy+40);
  ctx.quadraticCurveTo(-22,hy+54-tw,-15-tw*.5,hy+70);
  ctx.quadraticCurveTo(-12,hy+58,-10,hy+44);ctx.closePath();ctx.fill();ctx.stroke();

  // ===== ARMS — skin, brown gloves, big gold shoulder pads =====
  const armRaise=hurt?-.4:s.A||s.B?1.15:s.C?.7:.15+wk*.25;
  for(const[side,raise] of[[-1,armRaise],[1,armRaise*.62]]){
    ctx.save();ctx.translate(side*15,hy+8);
    // upper arm
    ctx.rotate(side*(.2)+ -raise*side);
    ctx.fillStyle=SK;ctx.strokeStyle=OL;ctx.lineWidth=2.2;
    ctx.beginPath();ctx.roundRect(-6,-2,12,20,5);ctx.fill();ctx.stroke();
    ctx.fillStyle=SKD;ctx.beginPath();ctx.roundRect(2,-1,4,18,3);ctx.fill();
    // forearm
    ctx.translate(0,17);ctx.rotate(side*.25);
    ctx.fillStyle=SK;ctx.beginPath();ctx.roundRect(-5,0,10,17,4);ctx.fill();ctx.strokeStyle=OL;ctx.lineWidth=2.2;ctx.stroke();
    // brown fingerless glove
    ctx.fillStyle=GLV;ctx.strokeStyle=OL;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(-6,13,12,11,3);ctx.fill();ctx.stroke();
    ctx.fillStyle=GLVD;ctx.fillRect(-6,13,12,3);
    // fist knuckle line
    ctx.strokeStyle=GLVD;ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(-4,21);ctx.lineTo(4,21);ctx.stroke();
    ctx.restore();
  }
  // GOLD SHOULDER PADS — big puffy segmented pads over the shoulders
  for(const side of[-1,1]){
    ctx.save();ctx.translate(side*16,hy+5);
    const pg=ctx.createRadialGradient(-side*3,-4,2,0,0,15);
    pg.addColorStop(0,GOLDH);pg.addColorStop(.6,GOLD);pg.addColorStop(1,GOLDD);
    ctx.fillStyle=pg;ctx.strokeStyle=OL;ctx.lineWidth=2.2;
    ctx.beginPath();ctx.ellipse(0,0,13,11,0,0,Math.PI*2);ctx.fill();ctx.stroke();
    // segment lines
    ctx.strokeStyle=GOLDD;ctx.lineWidth=1.6;
    ctx.beginPath();ctx.ellipse(0,0,8,7,0,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(0,0,4,3.5,0,0,Math.PI*2);ctx.stroke();
    // highlight glint
    ctx.fillStyle='rgba(255,255,255,.6)';ctx.beginPath();ctx.ellipse(-side*4,-5,3,2,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // attack FX
  if(s.A){ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.ellipse(40,hy+12,20,11,-.2,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(150,110,230,.6)';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(40,hy+12,28,16,-.2,0,Math.PI*2);ctx.stroke();}
  if(s.B){for(let g=0;g<3;g++){const gx=30+g*16,gy=hy+8+Math.sin(t*5+g)*7;
    ctx.fillStyle='rgba(150,110,225,.5)';ctx.beginPath();ctx.arc(gx,gy,9-g*1.6,0,Math.PI*2);ctx.fill();}}
  if(s.C){ctx.strokeStyle='rgba(180,140,240,.7)';ctx.lineWidth=6;ctx.beginPath();ctx.arc(34,hy+8,19,0,Math.PI*2);ctx.stroke();}

  // ===== NECK + HEAD =====
  ctx.fillStyle=SK;ctx.strokeStyle=OL;ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-6,hy+1,12,9,3);ctx.fill();ctx.stroke();
  // head — anime jaw shape
  ctx.fillStyle=SK;ctx.strokeStyle=OL;ctx.lineWidth=2.4;
  ctx.beginPath();
  ctx.moveTo(-13,hy-12);
  ctx.quadraticCurveTo(-15,hy+2,-7,hy+9);
  ctx.quadraticCurveTo(0,hy+13,7,hy+9);
  ctx.quadraticCurveTo(15,hy+2,13,hy-12);
  ctx.quadraticCurveTo(0,hy-20,-13,hy-12);ctx.closePath();
  ctx.fill();ctx.stroke();
  // jaw/cheek shading
  ctx.fillStyle=SKD;ctx.beginPath();ctx.moveTo(8,hy-8);ctx.quadraticCurveTo(13,hy+1,6,hy+9);ctx.quadraticCurveTo(9,hy+1,8,hy-8);ctx.closePath();ctx.fill();
  // ears
  for(const side of[-1,1]){ctx.fillStyle=SK;ctx.strokeStyle=OL;ctx.lineWidth=1.8;
    ctx.beginPath();ctx.ellipse(side*13,hy-3,3,5,0,0,Math.PI*2);ctx.fill();ctx.stroke();}

  // ===== GOTENKS HAIR — black centre spikes + purple side spikes =====
  // purple side spikes (behind head)
  ctx.fillStyle=PUR;ctx.strokeStyle=OL;ctx.lineWidth=2;
  for(const[side,sp] of[[-1,0],[1,0]]){
    for(const[ox,oy,tx,ty] of[[-12,hy-8,-26,hy-2],[-13,hy-13,-27,hy-14],[-11,hy-16,-22,hy-24]]){
      ctx.beginPath();
      ctx.moveTo(side*ox*-1*-1*0+side*(-ox),hy-8);
      // simpler: draw spike from head edge outward
      const bx=side*12,by=oy,ex=side*Math.abs(tx),ey=ty;
      ctx.beginPath();ctx.moveTo(bx,by-4);
      ctx.lineTo(ex,ey);
      ctx.lineTo(bx,by+5);ctx.closePath();ctx.fill();ctx.stroke();
    }
  }
  // purple highlight
  ctx.fillStyle=PURH;
  for(const side of[-1,1]){ctx.beginPath();ctx.moveTo(side*12,hy-12);ctx.lineTo(side*22,hy-16);ctx.lineTo(side*13,hy-9);ctx.closePath();ctx.fill();}
  // black hair — big upward spikes (Gotenks crown)
  ctx.fillStyle=BLK;ctx.strokeStyle=OL;ctx.lineWidth=2.2;
  const spikes=[[-13,hy-10,-20,hy-40],[-7,hy-15,-10,hy-50],[0,hy-17,0,hy-54],
                [7,hy-15,10,hy-50],[13,hy-10,20,hy-40]];
  for(const[bx,by,tx,ty] of spikes){
    ctx.beginPath();ctx.moveTo(bx-6,by+4);
    ctx.quadraticCurveTo(bx-3,by-10,tx,ty);
    ctx.quadraticCurveTo(bx+3,by-10,bx+6,by+4);
    ctx.closePath();ctx.fill();ctx.stroke();
  }
  // hair base mass over forehead
  ctx.fillStyle=BLK;ctx.strokeStyle=OL;ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(-14,hy-9);
  ctx.quadraticCurveTo(-12,hy-18,0,hy-19);
  ctx.quadraticCurveTo(12,hy-18,14,hy-9);
  ctx.quadraticCurveTo(8,hy-13,4,hy-8);
  ctx.quadraticCurveTo(0,hy-13,-4,hy-8);
  ctx.quadraticCurveTo(-8,hy-13,-14,hy-9);ctx.closePath();ctx.fill();ctx.stroke();
  // black hair sheen
  ctx.fillStyle=BLKH;
  ctx.beginPath();ctx.moveTo(-3,hy-16);ctx.quadraticCurveTo(-1,hy-44,2,hy-44);ctx.quadraticCurveTo(3,hy-20,3,hy-15);ctx.closePath();ctx.fill();

  // ===== FACE — angry white Gotenks eyes + thick brows =====
  // thick angry eyebrows
  ctx.fillStyle=BLK;
  ctx.beginPath();ctx.moveTo(-12,hy-7);ctx.lineTo(-2,hy-4);ctx.lineTo(-2,hy-1);ctx.lineTo(-12,hy-3);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(12,hy-7);ctx.lineTo(2,hy-4);ctx.lineTo(2,hy-1);ctx.lineTo(12,hy-3);ctx.closePath();ctx.fill();
  // white glowing slit eyes
  for(const side of[-1,1]){
    ctx.fillStyle=W;ctx.strokeStyle=OL;ctx.lineWidth=1.4;
    ctx.beginPath();
    ctx.moveTo(side*3,hy-2);
    ctx.quadraticCurveTo(side*7,hy-4,side*11,hy-1);
    ctx.quadraticCurveTo(side*7,hy+1,side*3,hy);ctx.closePath();
    ctx.fill();ctx.stroke();
    if(hurt){ctx.fillStyle=K;ctx.beginPath();ctx.arc(side*7,hy-1.5,1.6,0,Math.PI*2);ctx.fill();}
  }
  // eye glow
  ctx.globalAlpha=.3;ctx.fillStyle='#fff';
  for(const side of[-1,1]){ctx.beginPath();ctx.ellipse(side*7,hy-1.5,7,4,0,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  // nose
  ctx.strokeStyle=SKD;ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(0,hy-1);ctx.lineTo(2,hy+3);ctx.lineTo(-1,hy+4);ctx.stroke();
  // mouth — stern Gotenks frown / shout
  ctx.strokeStyle=K;ctx.lineWidth=2;ctx.beginPath();
  if(hurt){ctx.arc(0,hy+5,4,0,Math.PI);}
  else if(s.C||s.SU){ctx.fillStyle=K;ctx.beginPath();ctx.ellipse(0,hy+6,5,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();}
  else{ctx.moveTo(-5,hy+6);ctx.quadraticCurveTo(0,hy+4,5,hy+6);}
  ctx.stroke();

  if(hurt){ctx.fillStyle='rgba(150,110,220,.2)';ctx.beginPath();ctx.ellipse(0,hy-5,17,20,0,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}// ── SMEAGOL / GOLLUM ────────────────────────────────────────────────
function drawSmeagol(ctx,state,t){
  const b=state==='idle'?Math.sin(t*.09)*2:0,wk=state==='walk'?Math.sin(t*.14):0,hurt=state==='hurt';
  const GR='#88aa66',GRD='#4a6b38',PALE='#c8d4a0',W='#fff',K='#111',GD='#ffcc00';
  const s=atk(state),hy=-48+b;
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,5,22,6,0,0,Math.PI*2);ctx.fill();
  // Hunched gaunt legs
  ctx.fillStyle=PALE;ctx.save();ctx.translate(-8,0);ctx.rotate(.35+wk*.4);ctx.fillRect(-3,-14+b,6,14);ctx.restore();
  ctx.save();ctx.translate(8,0);ctx.rotate(-.35-wk*.4);ctx.fillRect(-3,-14+b,6,14);ctx.restore();
  ctx.fillStyle='#b0b890';ctx.beginPath();ctx.ellipse(-8,4,9,4,.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(8,4,9,4,-.3,0,Math.PI*2);ctx.fill();
  // Lean hunched body - loincloth/rags
  ctx.fillStyle=PALE;ctx.beginPath();ctx.ellipse(-3,hy+12,15,14,.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a0a870';ctx.beginPath();ctx.ellipse(-2,hy+10,11,10,.15,0,Math.PI*2);ctx.fill();
  // Ragged loincloth
  ctx.fillStyle='#8a7a50';ctx.beginPath();ctx.moveTo(-10,hy+20);ctx.lineTo(-8,hy+28);ctx.lineTo(0,hy+22);ctx.lineTo(8,hy+28);ctx.lineTo(10,hy+20);ctx.closePath();ctx.fill();
  // Grasping hands/arms
  const aL=hurt?.3:s.A||s.B?1.2:wk*.4+.4;
  ctx.fillStyle=PALE;ctx.save();ctx.translate(-16,hy+10);ctx.rotate(aL);ctx.fillRect(-3,-2,6,14);ctx.restore();
  ctx.save();ctx.translate(14,hy+12);ctx.rotate(-aL*.8+.3);ctx.fillRect(-3,-2,6,14);ctx.restore();
  // Long bony fingers
  if(s.A){for(let f=0;f<3;f++){ctx.strokeStyle=PALE;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-18+f*4,hy+20);ctx.lineTo(-24+f*4,hy+28+Math.sin(f+t)*3);ctx.stroke();}}
  if(s.B){// Gollum grabbing/wrestling with large claw marks
    ctx.fillStyle='rgba(180,200,120,.5)';ctx.beginPath();ctx.ellipse(-4,hy+8,22,16,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=PALE;ctx.lineWidth=1.5;for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(12-i*6,hy+2);ctx.lineTo(18-i*6,hy+20);ctx.stroke();}}
  if(s.C){// Ring throw glow
    ctx.strokeStyle=GD;ctx.lineWidth=4;ctx.shadowColor=GD;ctx.shadowBlur=12;
    ctx.beginPath();ctx.ellipse(30,hy-4,16,7,-.25,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,200,80,.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(30,hy-4,22,11,-.25,0,Math.PI*2);ctx.stroke();}
  // GOLLUM HEAD - huge wide pale with ENORMOUS eyes
  ctx.fillStyle=GRD;ctx.beginPath();ctx.ellipse(-2,hy-2,22,20,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=PALE;ctx.beginPath();ctx.ellipse(-1,hy-2,19,17,0,0,Math.PI*2);ctx.fill();
  // MASSIVE EYES - Gollum's most defining feature
  for(const[ex,ey2,er] of[[-9,hy-4,11],[9,hy-4,10]]){
    const eg=ctx.createRadialGradient(ex-2,ey2-2,1,ex,ey2,er);
    eg.addColorStop(0,'#ffffff');eg.addColorStop(1,'#e0f0e0');
    ctx.fillStyle=eg;ctx.beginPath();ctx.arc(ex,ey2,er,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ccddaa';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#8899cc';ctx.beginPath();ctx.arc(ex,ey2,er*.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=K;ctx.beginPath();ctx.arc(ex+wk*.4,ey2,er*.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=W;ctx.beginPath();ctx.arc(ex-er*.2,ey2-er*.2,er*.12,0,Math.PI*2);ctx.fill();
  }
  // LARGE POINTED EARS
  ctx.fillStyle=PALE;ctx.beginPath();ctx.moveTo(-20,hy-4);ctx.lineTo(-30,hy-22);ctx.lineTo(-14,hy-8);ctx.closePath();ctx.fill();
  ctx.strokeStyle=GRD;ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=PALE;ctx.beginPath();ctx.moveTo(16,hy-4);ctx.lineTo(28,hy-22);ctx.lineTo(12,hy-8);ctx.closePath();ctx.fill();
  ctx.strokeStyle=GRD;ctx.lineWidth=1;ctx.stroke();
  // Flat wide nose / nostrils
  ctx.fillStyle=GRD;ctx.beginPath();ctx.ellipse(-1,hy+6,6,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=K;ctx.beginPath();ctx.ellipse(-3,hy+7,2,1.5,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(2,hy+7,2,1.5,0,0,Math.PI*2);ctx.fill();
  // Wide grasping mouth
  ctx.strokeStyle=K;ctx.lineWidth=2;ctx.beginPath();

// Build full selectable roster (base + unlocked supers + anime)
let UNLOCKED=new Set();
try{const u=JSON.parse(localStorage.getItem('pf_unlocked')||'[]');u.forEach(id=>UNLOCKED.add(id));}catch(e){}
function saveUnlocked(){try{localStorage.setItem('pf_unlocked',JSON.stringify([...UNLOCKED]));}catch(e){}}
function unlockChar(id){UNLOCKED.add(id);saveUnlocked();showMsg('UNLOCKED: '+id.toUpperCase(),'#ffdd00',44,.9);}

// unlock(id) - adds to UNLOCKED set, persists, shows message, returns true if newly unlocked
function unlock(id){
  if(UNLOCKED.has(id))return false;// already unlocked
  UNLOCKED.add(id);invalidateRosterCache();
  saveUnlocked();
  showMsg('UNLOCKED: '+(getCHAR(id)?.name||id.toUpperCase()),'#ffdd00',32,1.2);
  return true;
}

  kerminal:'ss_kerminal',

function isCharUnlocked(id){
  if(GAMEMODE==='story')return ALL.includes(id);
  if(id==='phantom'){if(GAMEMODE==='survival')return true;return UNLOCKED.has('phantom');}
  if(GAMEMODE==='survival')return true;
  if(ALL.includes(id)||ANIME_CHARS[id])return true;
  return UNLOCKED.has(id);
}

function buildRoster(){
  const unlockIds=Object.keys(UNLOCKABLE_CHARS).filter(id=>UNLOCKED.has(id));
  const animeIds=Object.keys(ANIME_CHARS);
  return [...ALL,...animeIds,...unlockIds];
}
function getAllRoster(){return buildRoster();}
// Story mode roster - base chars only
function getStoryRoster(){return [...ALL];}
// Mode-aware roster helper used everywhere
function getModeRoster(){
  if(GAMEMODE==='story')return getStoryRoster();
  // Arcade + Survival: base + anime + unlocked supers
  const animeIds=Object.keys(ANIME_CHARS);
  const unlockIds=Object.keys(UNLOCKABLE_CHARS).filter(id=>UNLOCKED.has(id));
  return [...ALL,...animeIds,...unlockIds];
}

// Fix unlockable chars to use their own combo defs where available
Object.keys(UNLOCKABLE_CHARS).forEach(id=>{
  const uc=UNLOCKABLE_CHARS[id];
  if(COMBO_DEFS[id])uc.combos=COMBO_DEFS[id];
  else if(id==='phantom')uc.combos=PHANTOM_COMBO_DEFS;// Phantom uses own combo table
});

function flameWisp(ctx,x,y,col,t,count){
  count=count||8;
  for(let i=0;i<count;i++){
    const a=t*2.2+i/count*Math.PI*2,r=22+i*6;
    const fl=Math.sin(t*4+i)*.4;
    const fx=x+Math.cos(a+fl)*r,fy=y+Math.sin(a+fl)*r*.6;
    const alpha=(.55-i/count*.4)*(.5+Math.sin(t*6+i)*.5);
    ctx.fillStyle=col;ctx.globalAlpha=Math.max(0,alpha);
    ctx.beginPath();ctx.ellipse(fx,fy,3+i%3*2,5+i%4*2,a+t,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function lightningArcs(ctx,cx,cy,r,col,t,n){
  n=n||6;ctx.strokeStyle=col;ctx.lineCap='round';
  for(let i=0;i<n;i++){
    const a=t*3+i/n*Math.PI*2;
    const jag=3+i%3;const len=r*(0.6+Math.sin(t*5+i)*.3);
    ctx.lineWidth=1+i%2;ctx.globalAlpha=.4+Math.sin(t*7+i)*.4;
    ctx.beginPath();
    let px=cx+Math.cos(a)*r*.3,py=cy+Math.sin(a)*r*.3;
    ctx.moveTo(px,py);
    for(let s=0;s<jag;s++){
      px+=Math.cos(a)*(len/jag)+rand(-5,5);
      py+=Math.sin(a)*(len/jag)+rand(-3,3);
      ctx.lineTo(px,py);
    }
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function groundShockwave(ctx,x,t,col){
  for(let i=0;i<3;i++){
    const pr=((t*.8+i*.33)%1);
    ctx.strokeStyle=col;ctx.lineWidth=2.5-i*.5;
    ctx.globalAlpha=(1-pr)*.45;
    ctx.beginPath();ctx.ellipse(x,FLOOR,(75+i*18)*pr,(7+i*2)*pr,0,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;
}
function multiAura(ctx,cx,cy,cols,t){
  for(let layer=0;layer<cols.length;layer++){
    const r=36+layer*18+Math.sin(t*(1+layer*.4))*8;
    const ag=ctx.createRadialGradient(cx,cy,5,cx,cy,r);
    ag.addColorStop(0,cols[layer][0]);ag.addColorStop(.5,cols[layer][1]);ag.addColorStop(1,'rgba(0,0,0,0)');

let PROJS=[];
class BasicProj{
  constructor(owner,x,y,vx,vy,dmg,type){this.owner=owner;this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.dmg=dmg;this.type=type;this.life=3;this.hit=false;this.t=0;this.bounced=false;}
  update(dt,enemy){
    this.t+=dt;this.life-=dt;
    // ── UNIQUE MOVEMENT ANIMATIONS PER PROJECTILE TYPE ─────────
    const tp=this.type,d=Math.sign(this.vx||1);
    if(tp==='wave'||tp==='arc_wave'){
      // Kermit song wave: sinusoidal vertical oscillation
      this.vy=Math.sin(this.t*8)*1.8;
    } else if(tp==='bigwave'){
      // Kermit/SS big wave: arc up then fall, decelerates
      this.vy+=0.12;this.vx*=.99;
    } else if(tp==='concert'){
      // Rainbow burst: spiral outward with spin
      this.vy=Math.sin(this.t*10)*2.2;this.vx=d*(8+Math.cos(this.t*6)*.8);
    } else if(tp==='cookie'){
      // Cookie: bounces off floor once with crumble slowdown
      this.vy+=0.1;if(!this.bounced&&this.y>FLOOR-12){this.vy=-Math.abs(this.vy)*.65;this.vx*=.88;this.bounced=true;}
    } else if(tp==='feather'){
      // Big Bird feather: floats lazily, drift side to side
      this.vy+=0.04;this.vx=d*(4+Math.sin(this.t*3)*1.5);
    } else if(tp==='ghost'){
      // Ghost: strong homing, accelerates toward enemy
      if(enemy&&!this.hit){const dx=enemy.x-this.x,dy=(enemy.y-enemy.data.h*.5)-this.y,dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));if(dist>16){this.vx+=dx/dist*.45;this.vy+=dy/dist*.32;}this.vx=Math.sign(this.vx)*Math.min(Math.abs(this.vx),7);}
    } else if(tp==='bats'){
      // Count/Dracula bats: V-formation flutter, zigzag forward
      this.vy=Math.sin(this.t*12+this.dmg*.01)*2.4;
      if(this.owner&&this.owner.data&&this.owner.data.id==='fozzie_joker'&&enemy&&!this.hit){
        const dx=enemy.x-this.x,dy=(enemy.y-enemy.data.h*.5)-this.y,dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));
        if(dist>20){this.vx+=dx/dist*.35;this.vy+=dy/dist*.22;}
        this.vx=Math.sign(this.vx)*Math.min(Math.abs(this.vx),8);}
    } else if(tp==='pie'){
      // Pie: lobs in an arc, tumbles
      this.vy+=0.14;this.spin=(this.spin||0)+.18;
    } else if(tp==='star'){
      // Star: straight fast, slight upward curve then levels
      this.vy=Math.max(this.vy-.04,-1.2);this.vx=d*Math.min(Math.abs(this.vx)+.05,12);
    } else if(tp==='fish'){
      // Fish: wobbles up and down like swimming
      this.vy=Math.sin(this.t*9)*2;this.vx*=.99;
    } else if(tp==='spaceship'){
      // Spaceship: straight line, occasional sidestep
      this.vy=Math.sin(this.t*4)*.6;
    } else if(tp==='trash'){
      // Oscar trash: bounces off edges, slows
      this.vy+=0.1;this.vx*=.985;
      if(!this.bounced&&(this.x<20||this.x>W-20)){this.vx*=-0.9;this.bounced=true;}
    } else if(tp==='stench'){
      // Stench cloud: floats upward, expands, no gravity
      this.vy-=.04;this.vx*=.94;
    } else if(tp==='trash_rain'){
      // Trash rain: falls straight down fast
      this.vy+=0.2;
    }
    // ── NEW UNIQUE PROJECTILE ANIMATIONS ──────────────────────
    else if(tp==='gonzo_cannon'){
      // Gonzo cannonball: heavy arc, spins visually, gains speed downward
      this.vy+=0.18;this.vx*=.998;this.spin=(this.spin||0)+.22;
      // Smoke trail particles
      if(Math.floor(this.t*30)%2===0)FX.parts.push({x:this.x,y:this.y,vx:rand(-1,1),vy:rand(-.5,.5),life:.35,ml:.35,col:'rgba(140,140,140,.6)',r:rand(4,8),type:'s'});
    } else if(tp==='piggy_blade'){
      // Piggy blade: straight fast, spins rapidly, slight dip then rise
      this.vy=Math.sin(this.t*6)*.8;this.spin=(this.spin||0)+.35;
      // Blade shimmer
      if(Math.floor(this.t*20)%3===0)FX.parts.push({x:this.x+rand(-6,6),y:this.y+rand(-6,6),vx:0,vy:-.8,life:.25,ml:.25,col:'#ff88cc',r:3,type:'s'});
    } else if(tp==='ssb_beam'){
      // SSB beam: perfectly straight, expands width, leaves glow trail
      this.vy=0;// no gravity - ki beam
      if(Math.floor(this.t*24)%2===0)FX.parts.push({x:this.x-d*8,y:this.y+rand(-4,4),vx:rand(-.5,.5),vy:rand(-.5,.5),life:.2,ml:.2,col:'rgba(100,180,255,.6)',r:rand(3,6),type:'s'});
    } else if(tp==='joker_card'){
      // Joker card: boomerangs back if misses, tumbles
      this.spin=(this.spin||0)+.28;
      if(this.t>1.2&&!this.hit){// return arc
        this.vx=-this.vx*.6;this.vy=Math.sin(this.t*5)*2;
      } else {this.vy=Math.sin(this.t*7)*1.2;}
    } else if(tp==='avatar_orb'){
      // Avatar orb: slow steady flight, orbiting elements pulse
      this.vy=Math.sin(this.t*4)*.5;this.vx=d*(6.5+Math.sin(this.t*3)*.4);
      // Element particle trail
      if(Math.floor(this.t*20)%4===0){const ec=['#ff8800','#3399ff','#44cc22','#ffffff'];FX.parts.push({x:this.x,y:this.y,vx:rand(-1,1),vy:rand(-1,1),life:.4,ml:.4,col:ec[(this.elem||0)%4],r:4,type:'s'});}
    } else if(tp==='necroplasm'){
      // Necroplasm: slight homing + corrosive drip trail
      this.vy=Math.sin(this.t*5)*.7;this.vx*=.998;
      if(enemy&&!this.hit){const dx=enemy.x-this.x,dy=(enemy.y-enemy.data.h*.5)-this.y,dist=Math.max(1,Math.sqrt(dx*dx+dy*dy));if(dist>40){this.vx+=dx/dist*.12;this.vy+=dy/dist*.08;}}
      if(Math.floor(this.t*18)%2===0)FX.parts.push({x:this.x+rand(-5,5),y:this.y+rand(0,8),vx:0,vy:.5,life:.4,ml:.4,col:'rgba(0,200,60,.5)',r:rand(2,5),type:'s'});
    } else if(tp==='yamato_slash'){
      // Yamato slash: ultra-fast burst then fades (short life)
      this.life=Math.min(this.life,.7);// force short life
      this.vy=0;// perfectly horizontal
      // Slash afterimage
      FX.parts.push({x:this.x-d*14,y:this.y,vx:0,vy:0,life:.15,ml:.15,col:'rgba(180,200,255,.4)',r:14,type:'s'});
    } else if(tp==='rasengan'){
      // Rasengan: pushes forward with increasing speed, spins wildly
      this.vx=d*(6+this.t*1.2);this.vy=Math.sin(this.t*4)*.4;
      // Chakra spiral particles
      if(Math.floor(this.t*30)%2===0){const ra=this.t*6;FX.parts.push({x:this.x+Math.cos(ra)*10,y:this.y+Math.sin(ra)*10,vx:Math.cos(ra)*1.5,vy:Math.sin(ra)*1.5,life:.3,ml:.3,col:'rgba(80,180,255,.7)',r:3,type:'s'});}
    } else if(tp==='ranger_arrow'){
      // Ranger arrow: dead straight, no gravity - ranger precision
      this.vy=0;this.life=Math.max(this.life,.4);// arrows don't timeout
    } else if(tp==='spirit_lightning'){
      // Chidori lightning: blinks along zigzag path, re-randomizes zigs
      this.vy=0;
      if(Math.floor(this.t*20)%3===0){if(this.zigs)for(let i=0;i<this.zigs.length;i++)this.zigs[i]+=rand(-3,3);}
      // Lightning plasma trail
      FX.parts.push({x:this.x-d*10,y:this.y+(this.zigs?this.zigs[0]||0:0),vx:rand(-1.5,1.5),vy:rand(-1.5,1.5),life:.18,ml:.18,col:'rgba(150,180,255,.7)',r:rand(2,5),type:'s'});
    } else if(tp==='thunder_taijutsu'){
      // Primary Lotus: expands as it travels, leaves spinning after-ring
      this.vy=0;this.vx*=.96;// decelerates as it expands
      // Energy ring particles
      if(Math.floor(this.t*15)%2===0){const ta=this.t*5;const tr=16+this.t*10;FX.parts.push({x:this.x+Math.cos(ta)*tr*.7,y:this.y+Math.sin(ta)*tr*.5,vx:Math.cos(ta)*.5,vy:Math.sin(ta)*.5,life:.3,ml:.3,col:'rgba(255,200,50,.5)',r:4,type:'s'});}
    } else if(tp==='judo_wind'){
      // Wind scar: accelerates forward, slight upward drift per tier
      this.vx=d*(9+this.t*2.5);const tier=this.tier||0;this.vy=-(tier*.4);
      this.life=Math.min(this.life,.55);// wind scars are fast and brief
    } else {
      // Default gravity for unlisted types
      this.vy+=0.08;
    }
    this.x+=this.vx;this.y+=this.vy;
    if(!this.hit){
      const hitR=(tp==='stench')?52:tp==='thunder_taijutsu'?(16+this.t*10):tp==='yamato_slash'?36:32;
      const hitH=(tp==='stench')?62:tp==='thunder_taijutsu'?(16+this.t*10):48;
      const dx=Math.abs(enemy.x-this.x),dy=Math.abs((enemy.y-enemy.data.h/2)-this.y);
      if(dx<hitR&&dy<hitH){
        this.hit=true;
        let hs=18;
        if(tp==='pie'||tp==='fish')hs=this.owner.data.atk.B?.hs*1.5||27;
        if(tp==='pie'&&this.owner.data.id==='fuzzybear')hs*=1.5;
        if(tp==='stench')hs=24;
        if(tp==='rasengan'||tp==='spirit_lightning')hs=24;// high juggle
        if(tp==='yamato_slash'){hs=22;FX.screenShake(4);}
        if(tp==='gonzo_cannon'){hs=28;FX.screenShake(5);}
        if(tp==='thunder_taijutsu'){hs=26;FX.screenShake(3);}
        enemy.takeDmg(this.dmg,{x:Math.sign(this.vx||d)*5,y:-2},Math.round(hs));
        const srcAtk=this.owner.data.atk[this.owner.atkKey];
        if(srcAtk?.slow&&enemy.vx!==0){enemy.vx*=.22;FX.addText(this.x,this.y-40,'SLOW!','#66aaff',14);}
        FX.hitSpark(this.x,this.y,tp==='stench');JAZZ.hit(tp==='stench');
        // Type-specific hit effects
        if(tp==='gonzo_cannon'){FX.screenShake(5);for(let i=0;i<8;i++)FX.parts.push({x:this.x,y:this.y,vx:rand(-5,5),vy:rand(-5,1),life:.5,ml:.5,col:'#888',r:rand(4,10),type:'s'});}
        if(tp==='rasengan'){FX.screenShake(4);for(let i=0;i<6;i++){const ra=i/6*Math.PI*2;FX.parts.push({x:this.x,y:this.y,vx:Math.cos(ra)*4,vy:Math.sin(ra)*4,life:.4,ml:.4,col:'#44aaff',r:5,type:'s'});}}
        if(tp==='spirit_lightning'){FX.screenShake(5);for(let i=0;i<5;i++)FX.parts.push({x:this.x,y:this.y,vx:rand(-4,4),vy:rand(-4,0),life:.35,ml:.35,col:'rgba(180,200,255,.8)',r:rand(3,7),type:'s'});}
        if(tp==='necroplasm'){for(let i=0;i<6;i++)FX.parts.push({x:this.x,y:this.y,vx:rand(-3,3),vy:rand(-2,2),life:.5,ml:.5,col:'#00cc44',r:rand(4,8),type:'s'});}
      }
    }
    // Captain Oscar arrows persist through flight
    if(this.owner.data.id==='captain_oscar'&&tp==='ranger_arrow'&&!this.hit)this.life=Math.max(this.life,.4);
    return this.life>0&&this.x>-200&&this.x<W+200&&this.y<H+100;
  }
  draw(ctx){
    if(!this.type)return;
    const al=Math.min(1,Math.max(0,this.life));
    ctx.save();ctx.translate(this.x,this.y);
    // ── CLASSIC PROJECTILE VISUALS ────────────────────────────
    if(this.type==='wave'){
      // HADOUKEN - yellow chi fireball with flame corona
      ctx.globalAlpha=al;

      ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();

      ctx.fillStyle=kg;ctx.beginPath();ctx.ellipse(0,0,bw/2,9,0,0,Math.PI*2);ctx.fill();

    }

      for(let i=0;i<7;i++){const a=this.t*3+i/7*Math.PI*2,r=14;

class SpaceshipProj{

    if(this.phase===1){const la=0.7+Math.sin(this.t*25)*.3,bH=FLOOR-this.y-14;const lg=ctx.createLinearGradient(0,14,0,bH);lg.addColorStop(0,`rgba(255,60,60,${la})`);lg.addColorStop(1,'rgba(255,60,0,0)');ctx.fillStyle=lg;ctx.fillRect(-6,14,12,bH);ctx.fillStyle=`rgba(255,200,200,${la*.3})`;ctx.fillRect(-16,14,32,bH);}

//  FX - ENHANCED BATTLE ANIMATIONS
// ══════════════════════════════════════════════════════
const FX={
  parts:[],trails:[],shockwaves:[],shake:{x:0,y:0,t:0},hitstop:0,flashA:0,flashCol:'#fff',slowMo:0,
  hitSpark(x,y,big,col){
    const n=big?22:10,cols=col?[col,col+'aa','#fff']:[' #ffff00','#ff8800','#fff','#ff4400'];
    for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(big?5:2.5,big?16:9);this.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,life:rand(.4,.9),ml:rand(.4,.9),r:rand(2,big?10:6),col:cols[0|rand(0,cols.length)],type:'s'});}
    // Shockwave ring on big hits
    if(big)this.parts.push({x,y,vx:0,vy:0,life:.45,ml:.45,r:0,maxR:55,col:col||'#ffcc00',type:'ring'});
    if(big){this.shake.t=Math.max(this.shake.t,5);this.hitstop=.14;}else{this.shake.t=Math.max(this.shake.t,2);this.hitstop=.06;}
  },
  addText(x,y,text,col,size){if(this.parts.length>=200)return;this.parts.push({x,y,vx:rand(-1,1),vy:-1.2,life:1.6,ml:1.6,text,col:col||'#fff',size:size||20,type:'t'});},
  superFlash(col){this.flashA=1;this.flashCol=col;},
  screenShake(p){this.shake.t=Math.max(this.shake.t,p);},
  special(x,y,col){if(this.parts.length>=180)return;for(let i=0;i<26;i++){const a=rand(0,Math.PI*2),sp=rand(3,14);this.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,life:.9,ml:.9,r:rand(3,12),col,type:'r'});}},
  addTrail(x,y,col){this.trails.push({x,y,col,life:.22,ml:.22});},
  update(dt){
    if(this.hitstop>0){this.hitstop=Math.max(0,this.hitstop-dt);return false;}
    if(this.slowMo>0)dt*=.35,this.slowMo=Math.max(0,this.slowMo-dt);
    // Age ground shockwave rings
    for(let i=this.shockwaves.length-1;i>=0;i--){
      this.shockwaves[i].t+=dt;
      if(this.shockwaves[i].t>=1)this.shockwaves.splice(i,1);
    }
    // In-place particle update - avoids .filter() allocation every frame
    for(let i=this.parts.length-1;i>=0;i--){
      const p=this.parts[i];p.life-=dt;p.x+=p.vx;p.y+=p.vy;p.vy+=.18;
      if(p.type==='ring')p.r=p.maxR*(1-p.life/p.ml);
      if(p.life<=0)this.parts.splice(i,1);
    }
    // Cap particles to prevent memory runaway
    if(this.parts.length>200)this.parts.splice(0,this.parts.length-200);
    for(let i=this.trails.length-1;i>=0;i--){
      const p=this.trails[i];p.life-=dt;
      if(p.life<=0)this.trails.splice(i,1);
    }
    if(this.trails.length>50)this.trails.splice(0,this.trails.length-50);
    if(this.shake.t>0){this.shake.x=rand(-this.shake.t,this.shake.t)*3.8;this.shake.y=rand(-this.shake.t,this.shake.t)*2.2;this.shake.t=Math.max(0,this.shake.t-.12);}else{this.shake.x=0;this.shake.y=0;}
    if(this.flashA>0)this.flashA=Math.max(0,this.flashA-.052);
    return true;
  },
  draw(ctx){
    for(const p of this.trails){ctx.save();ctx.globalAlpha=p.life/p.ml*.4;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,8,0,Math.PI*2);ctx.fill();ctx.restore();}
    for(const p of this.parts){
      const a=clamp(p.life/p.ml,0,1);
      if(p.type==='t'){ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.col;ctx.font=`bold ${p.size}px Impact,sans-serif`;ctx.textAlign='center';ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.strokeText(p.text,p.x,p.y);ctx.fillText(p.text,p.x,p.y);ctx.restore();}
      else if(p.type==='ring'){ctx.save();ctx.globalAlpha=a*.65;ctx.strokeStyle=p.col;ctx.lineWidth=4*(a);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();ctx.restore();}
      else{ctx.save();ctx.globalAlpha=a*.9;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill();ctx.restore();}
    }
    if(this.flashA>0){ctx.save();ctx.globalAlpha=this.flashA*.52;ctx.fillStyle=this.flashCol;ctx.fillRect(0,0,W,H);ctx.restore();}
  }
};

function drawStage(ctx,idx,t){
  if(idx===0)stageMuppetTheater(ctx,t);
  else if(idx===1)stageSesame(ctx,t);
  else if(idx===2)stageElectric(ctx,t);
  else if(idx===3)stageCastle(ctx,t);
  else if(idx===4)stageComedyClub(ctx,t);
  else if(idx===5)stageValleyEnd(ctx,t);
  else if(idx===6)stageNamek(ctx,t);
  else if(idx===7)stageHobbiton(ctx,t);
  else if(idx===8)stageWingZero(ctx,t);
  else if(idx===9)stageGotham(ctx,t);
  else if(idx===10)stageHiddenLeaf(ctx,t);
  else if(idx===11)stageVampireManor(ctx,t);
  else stageSesameArena(ctx,t);
  // ── Universal visual enhancements ──────────────────────────
  // Depth fog at top and bottom edges
  const fogT=ctx.createLinearGradient(0,0,0,60);fogT.addColorStop(0,'rgba(0,0,0,.55)');fogT.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=fogT;ctx.fillRect(0,0,W,60);
  const fogB=ctx.createLinearGradient(0,H-40,0,H);fogB.addColorStop(0,'rgba(0,0,0,0)');fogB.addColorStop(1,'rgba(0,0,0,.7)');ctx.fillStyle=fogB;ctx.fillRect(0,H-40,W,40);
  // Vignette (radial dark edges)
  const vig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,W*.75);vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.55)');ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  // Animated scanline shimmer on floor
  const floorShine=ctx.createLinearGradient(0,FLOOR,W,FLOOR+8);floorShine.addColorStop(0,'rgba(255,255,255,0)');floorShine.addColorStop((Math.sin(t*.6)*.5+.5)*.8,'rgba(255,255,255,.04)');floorShine.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=floorShine;ctx.fillRect(0,FLOOR,W,8);
}
function stageFloor(ctx,col1,col2){const fg=ctx.createLinearGradient(0,FLOOR,0,H);fg.addColorStop(0,col1);fg.addColorStop(1,col2);ctx.fillStyle=fg;ctx.fillRect(0,FLOOR,W,H-FLOOR);}

function stageMuppetTheater(ctx,t){
  // Rich theater interior: curtains, spotlights, audience, balconies
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#2a1040');bg.addColorStop(.5,'#3a1855');bg.addColorStop(1,'#1e0c30');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Audience silhouettes in background
  for(let r=0;r<3;r++){for(let c=0;c<18;c++){const hx=c*46+23+(r%2)*22,hy=120-r*22;const bob2=Math.sin(t*1.1+c*.9+r)*.8;ctx.fillStyle=`rgba(20,0,40,${.55+r*.1})`;ctx.beginPath();ctx.ellipse(hx,hy+bob2,9,12,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(hx,hy-14+bob2,7,7,0,0,Math.PI*2);ctx.fill();}}
  // Stars in rafters
  for(let i=0;i<55;i++){const sx=(i*137.5)%W,sy=(i*97.3)%60+8;ctx.fillStyle=`rgba(255,255,255,${(Math.sin(t*1.1+i*.8)*.5+.5)*.7})`;ctx.beginPath();ctx.arc(sx,sy,i%5<1?2:1,0,Math.PI*2);ctx.fill();}
  // Proscenium arch
  ctx.strokeStyle='#8b5c00';ctx.lineWidth=14;ctx.beginPath();ctx.arc(W/2,-30,480,Math.PI*.1,Math.PI*.9);ctx.stroke();
  // Gold rail across top
  ctx.fillStyle='#cc8800';ctx.fillRect(0,0,W,16);ctx.fillStyle='#ffcc00';ctx.fillRect(0,13,W,5);
  // Side curtains with swag
  [[0,180,false],[W,180,true]].forEach(([x,w,flip])=>{const g=ctx.createLinearGradient(x,0,x+(flip?-w:w),0);g.addColorStop(0,'#6a0000');g.addColorStop(.6,'#400000');g.addColorStop(1,'rgba(60,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+(flip?-w:w),0);ctx.lineTo(x+(flip?-w*.7:w*.7),FLOOR);ctx.lineTo(x,FLOOR);ctx.closePath();ctx.fill();
    // Curtain swag folds
    for(let f=0;f<4;f++){const fx=flip?x-f*w*.22:x+f*w*.22,fy=FLOOR*.15+f*18;ctx.fillStyle='rgba(120,0,0,.3)';ctx.beginPath();ctx.ellipse(fx,fy,14,22,flip?.2:-.2,0,Math.PI*2);ctx.fill();}
  });
  // Stage box seats
  ctx.fillStyle='#4a2a00';ctx.fillRect(0,160,130,18);ctx.fillRect(W-130,160,130,18);
  [[20,158],[45,152],[70,156],[92,150]].forEach(([hx,hy])=>{ctx.fillStyle='#220800';ctx.beginPath();ctx.ellipse(hx,hy,8,11,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(hx,hy-12,6,6,0,0,Math.PI*2);ctx.fill();});
  [[W-20,158],[W-45,152],[W-70,156],[W-92,150]].forEach(([hx,hy])=>{ctx.fillStyle='#220800';ctx.beginPath();ctx.ellipse(hx,hy,8,11,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(hx,hy-12,6,6,0,0,Math.PI*2);ctx.fill();});
  stageFloor(ctx,'#5a3800','#2e1800');
  // Wood grain lines
  ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=2;for(let i=0;i<18;i++){ctx.beginPath();ctx.moveTo(i*47,FLOOR);ctx.lineTo(i*47+22,H);ctx.stroke();}
  // Spotlights (animated sweep)
  for(let i=0;i<2;i++){const sx=i===0?180:620,tx=W/2+(Math.sin(t*.4+i)*60)*(i?-1:1);const sg=ctx.createLinearGradient(sx,0,tx,FLOOR);sg.addColorStop(0,`rgba(255,240,180,.12)`);sg.addColorStop(1,'rgba(255,240,180,0)');ctx.fillStyle=sg;ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(tx-36,FLOOR);ctx.lineTo(tx+36,FLOOR);ctx.closePath();ctx.fill();}
  // Footlights
  ['#ffcc44','#ff4444','#44ccff','#ffcc44','#ff4444','#44ccff'].forEach((col,i)=>{const lx=80+i*130;ctx.fillStyle=col;ctx.globalAlpha=.5+Math.sin(t*3+i)*.3;ctx.beginPath();ctx.arc(lx,FLOOR-2,6,0,Math.PI*2);ctx.fill();ctx.fillStyle=col;ctx.globalAlpha=.08+Math.sin(t*3+i)*.05;ctx.beginPath();ctx.ellipse(lx,FLOOR-20,18,36,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
  // Stage centerline glow
  ctx.strokeStyle='rgba(255,200,0,.15)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
}
function stageSesame(ctx,t){
  // Sesame Street daytime - buildings, stoops, 123 door, animated birds
  const sky=ctx.createLinearGradient(0,0,0,FLOOR);sky.addColorStop(0,'#4ab0f5');sky.addColorStop(1,'#b0e0f8');ctx.fillStyle=sky;ctx.fillRect(0,0,W,FLOOR);
  // Animated clouds
  for(let c=0;c<4;c++){const cx2=(c*220+t*12+c*40)%W,cy2=30+c*18;ctx.fillStyle='rgba(255,255,255,.88)';[[cx2,cy2,28],[cx2-22,cy2+8,20],[cx2+22,cy2+8,20],[cx2-10,cy2-8,18],[cx2+10,cy2-8,16]].forEach(([cx3,cy3,r])=>{ctx.beginPath();ctx.arc(cx3,cy3,r,0,Math.PI*2);ctx.fill();});}
  // Sun
  const sx2=680,sy2=55;const sg=ctx.createRadialGradient(sx2,sy2,8,sx2,sy2,55);sg.addColorStop(0,'#ffff88');sg.addColorStop(.5,'#ffcc00');sg.addColorStop(1,'rgba(255,200,0,0)');ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sx2,sy2,32,0,Math.PI*2);ctx.fill();
  for(let r=0;r<8;r++){const ra=r/8*Math.PI*2+t*.3,rl=42+Math.sin(t*2+r)*4;ctx.strokeStyle='rgba(255,220,0,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(sx2+Math.cos(ra)*32,sy2+Math.sin(ra)*32);ctx.lineTo(sx2+Math.cos(ra)*rl,sy2+Math.sin(ra)*rl);ctx.stroke();}
  // Buildings backdrop (brownstones)
  const cFn=(cx,cy,s)=>{ctx.fillStyle='rgba(255,255,255,.92)';[[0,0,s],[s*.6,-s*.3,s*.7],[s*1.2,0,s*.8],[s*.3,s*.4,s*.6]].forEach(([ox,oy,r])=>{ctx.beginPath();ctx.ellipse(cx+ox,cy+oy,r,r*.5,0,0,Math.PI*2);ctx.fill();});};
  [[0,95,115,230,'#8b5c3a'],[108,110,85,215,'#7a5028'],[186,70,118,255,'#6a4018'],[570,85,95,230,'#9a6840'],[665,100,80,210,'#7a5028'],[718,75,110,235,'#8b5c3a']].forEach(([bx,by,bw,bh,bc2])=>{ctx.fillStyle=bc2;ctx.fillRect(bx,by,bw,bh);// Windows
    for(let wr=0;wr<3;wr++)for(let wc=0;wc<3;wc++){const wx=bx+12+wc*26,wy=by+12+wr*30;ctx.fillStyle=Math.random()>.7?'#ffff88':'rgba(0,0,0,.5)';ctx.fillRect(wx,wy,14,18);}});
  // '123 SESAME ST' sign on door
  ctx.fillStyle='#cc3300';ctx.fillRect(106,145,88,28);ctx.fillStyle='#fff';ctx.font='bold 9px Impact,sans-serif';ctx.textAlign='center';ctx.fillText('123',150,155);ctx.fillStyle='#ffdd00';ctx.font='6px Impact,sans-serif';ctx.fillText('SESAME ST',150,163);
  // Animated bird (Tweety-style) on wire
  const bx2=280+Math.sin(t*.6)*15,by2=88;ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.ellipse(bx2,by2,11,9,Math.sin(t)*.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bx2,by2-10,8,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8800';ctx.beginPath();ctx.moveTo(bx2-2,by2-10);ctx.lineTo(bx2-8,by2-8);ctx.lineTo(bx2-2,by2-6);ctx.closePath();ctx.fill();// eye
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(bx2+2,by2-11,2,0,Math.PI*2);ctx.fill();
  // Wire
  ctx.strokeStyle='#333';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(220,85);ctx.lineTo(360,90);ctx.stroke();
  stageFloor(ctx,'#5a5a5a','#383838');ctx.fillStyle='#8a8880';ctx.fillRect(0,FLOOR,W,32);
  // Sidewalk cracks
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;[130,280,430,580].forEach(cx3=>{ctx.beginPath();ctx.moveTo(cx3,FLOOR);ctx.lineTo(cx3+20,H);ctx.stroke();});
  ctx.strokeStyle='rgba(255,255,200,.15)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FLOOR);ctx.lineTo(W,FLOOR);ctx.stroke();
}
function stageElectric(ctx,t){
  // Electric Mayhem - rock concert, stage lights, speaker stacks, crowd
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#18003a');bg.addColorStop(1,'#0e0028');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Back wall with neon grid
  ctx.strokeStyle='rgba(80,0,140,.22)';ctx.lineWidth=1;
  for(let gx=0;gx<W;gx+=40){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,FLOOR);ctx.stroke();}
  for(let gy=0;gy<FLOOR;gy+=30){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}
  // Audience silhouettes (wild crowd)
  for(let c=0;c<22;c++){const hx=c*38+19,hy=148+Math.sin(t*3+c*.7)*6;const handUp=Math.sin(t*2+c)>.4;ctx.fillStyle='rgba(20,0,30,.8)';ctx.beginPath();ctx.ellipse(hx,hy,10,14,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(hx,hy-16,7,7,0,0,Math.PI*2);ctx.fill();if(handUp){ctx.fillRect(hx-2,hy-28,4,14);}}
  // Rotating color beams — safe hex→rgba helper
  const bc=['#ff0088','#00ffcc','#ff6600','#8800ff','#00ff44'];
  const bcR=[255,0,255,136,0],bcG=[0,255,102,0,255],bcB=[136,204,0,255,68];
  for(let i=0;i<5;i++){
    const a=t*.6+i/5*Math.PI*2,bx=W/2+Math.cos(a)*200,bfx=W/2+Math.cos(a)*30;
    const alpha=.18+Math.sin(t*2+i)*.08;
    const beamCol='rgba('+bcR[i]+','+bcG[i]+','+bcB[i]+','+alpha.toFixed(3)+')';
    const lg=ctx.createLinearGradient(bfx,0,bx,FLOOR*.8);
    lg.addColorStop(0,beamCol);lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=.08+Math.sin(t*2.5+i)*.04;ctx.fillStyle=lg;
    ctx.beginPath();ctx.moveTo(bfx,0);ctx.lineTo(bx-22,FLOOR*.8);ctx.lineTo(bx+22,FLOOR*.8);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
  }
  // Speaker stacks
  const spkr=[[20,FLOOR-120,55,120],[W-75,FLOOR-120,55,120]];
  for(let si=0;si<2;si++){const[sx,sy,sw,sh]=spkr[si];ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.roundRect(sx,sy,sw,sh,4);ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=1;ctx.stroke();for(let sp=0;sp<4;sp++){ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.ellipse(sx+sw/2,sy+16+sp*26,16,14,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();}}
  // Floating neon eq bars
  const eqH=[.4,.8,.6,1,.7,.9,.5,.85,.65,.95,.55,.75];
  for(let i=0;i<eqH.length;i++){const bh2=40*(eqH[i]+Math.sin(t*8+i)*.2),bx2=160+i*40,by2=FLOOR-bh2-6;const bi=i%5;ctx.fillStyle='rgba('+bcR[bi]+','+bcG[bi]+','+bcB[bi]+',.6)';ctx.globalAlpha=.22+Math.sin(t*5+i)*.1;ctx.fillRect(bx2,by2,14,bh2);ctx.globalAlpha=1;}

  getHurtbox(){return{x:this.x-22,y:this.y-this.data.h,w:44,h:this.data.h};}
  getHitbox(){

      const c=this.activeCombo;
      if(this.atkFrame<c.su||this.atkFrame>=c.su+c.a)return null;
      const f=this.facing,reach=c.reach||60;

    this.cbuf.push({key:newKey,t:now});
    if(this.cbuf.length<2)return null;

      const seq=c.seq;const L=seq.length;

      ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(shieldX,shieldY+shieldH*.4,bSize,shieldH*.55,0,0,Math.PI*2);ctx.fill();

      ctx.strokeStyle=`rgba(150,220,255,${.6+Math.sin(this.fr*.4)*.3})`;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.ellipse(shieldX,shieldY+shieldH*.4,bSize,shieldH*.55,0,0,Math.PI*2);ctx.stroke();
      // Shield cross pattern
      ctx.strokeStyle=`rgba(200,240,255,${.3+Math.sin(this.fr*.35)*.15})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(shieldX-bSize*.5,shieldY+shieldH*.4);ctx.lineTo(shieldX+bSize*.5,shieldY+shieldH*.4);
      ctx.moveTo(shieldX,shieldY+shieldH*.4-shieldH*.3);ctx.lineTo(shieldX,shieldY+shieldH*.4+shieldH*.3);ctx.stroke();
    }
    ctx.restore();
    // Combo counter - boost scale for combos
    if(this.comboCount>=2&&this.comboTimer>0){
      const a=Math.min(1,this.comboTimer*.8),sc=1+Math.min(.4,(this.comboCount-2)*.06);
      ctx.save();ctx.globalAlpha=a;ctx.translate(this.x,this.y-this.data.h-36);ctx.scale(sc,sc);
      ctx.strokeStyle='#000';ctx.lineWidth=5;
      ctx.fillStyle=this.activeCombo?this.activeCombo.col||'#ffff00':'#ffff00';
      ctx.font='bold 22px Impact,sans-serif';ctx.textAlign='center';
      ctx.strokeText(`${this.comboCount} HIT!`,0,0);ctx.fillText(`${this.comboCount} HIT!`,0,0);ctx.restore();
    }
    if(this.data.id==='elmo'&&!this.dead&&Math.random()>.85)FX.parts.push({x:this.x+rand(-20,20),y:this.y-rand(30,90),vx:rand(-1,1),vy:-1,life:.8,ml:.8,r:3,col:'#ff6655',type:'s'});
    if(this.data.id==='animal'&&this.hp/this.maxHp<.4&&!this.dead){ctx.save();ctx.globalAlpha=.12+Math.sin(Date.now()*.01)*.08;ctx.fillStyle='#ff4400';ctx.beginPath();ctx.ellipse(this.x,this.y-60,40,60,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  }
}

// ══════════════════════════════════════════════════════
//  AI
// ══════════════════════════════════════════════════════
class AI{
  constructor(){this.timer=0;this.mode='approach';}
  reset(){this.timer=0;this.mode='approach';}
  update(fighter,opponent,dt,diff=1){
    const inp={dir:{x:0,y:0},jp:{A:0,B:0,C:0,S:0,X:0},btn:{A:0,B:0,C:0,S:0,X:0}};
    if(fighter.dead||fighter.state==='hurt')return inp;
    const dx=Math.abs(opponent.x-fighter.x),sign=Math.sign(opponent.x-fighter.x);
    this.timer-=dt;
    if(this.timer<=0){
      const hp=fighter.hp/fighter.maxHp;
      if(hp<.18&&fighter.meter>=100)this.mode='super';
      else if(opponent.state==='attack'&&dx<180&&opponent.atkFrame<(opponent.data.atk[opponent.atkKey]?.su||5)&&Math.random()<.32)this.mode='block';// anticipate incoming hit
      else if(this.mode==='block'&&(!opponent.atkKey||dx>180))this.mode='approach';// stop blocking when safe
      else if(dx<90)this.mode=Math.random()<Math.min(.8,.35+diff*.15)?'attack':Math.random()<.4?'retreat':'jump';
      else if(dx<250)this.mode=Math.random()<Math.min(.5,.1+diff*.1)?'jump':'approach';
      else this.mode='approach';
      this.timer=rand(Math.max(.06,.1-.03*diff),Math.max(.2,.55-.1*diff));
    }
    if(this.mode==='approach')inp.dir.x=sign;else if(this.mode==='retreat')inp.dir.x=-sign;else if(this.mode==='jump'){inp.dir.x=sign;if(fighter.onGround)inp.dir.y=-1;}
    else if(this.mode==='attack'){if(dx<150){const r=Math.random();if(r<.28)inp.jp.A=1;else if(r<.52)inp.jp.B=1;else if(r<.68)inp.jp.C=1;else inp.jp.S=1;}else if(dx<320&&Math.random()<.18)inp.jp.A=1;else inp.dir.x=sign;}
    else if(this.mode==='super'){fighter.lastS=0;fighter.meter=100;inp.jp.S=1;}
    else if(this.mode==='block'){inp.btn={...inp.btn,X:1};inp.jp={...inp.jp,X:1};}
    return inp;
  }
}

function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function doCombat(atk,def){
  const hb=atk.getHitbox();if(!hb||atk.hitSet.has(def))return;
  // ARMOR: if attacker's current attack has armor:true, they absorb one hit while attacking
  if(def.state==='attack'&&def.atkKey&&def.data.atk[def.atkKey]?.armor&&!def.armorBroken){
    def.armorBroken=true;// absorb this hit - show effect
    FX.hitSpark(def.x,def.y-def.data.h*.5,false,'#ffdd00');
    FX.addText(def.x,def.y-def.data.h-8,'ARMOR!','#ffdd00',16);
    return;// the defending attacker ignores the hit due to armor
  }
  const hurt=def.getHurtbox();if(!overlap(hb,hurt)||def.invinF>0)return;
  const a=hb.atk;
  // Animal DRUM FURY: 40% extra damage below 40% HP
  let dmg=a.d;if(atk.data.id==='animal'&&atk.hp/atk.maxHp<.4)dmg=Math.floor(dmg*1.4);
  // SUPER SAIYAN: +25% all damage
  if(atk.data.id==='ss_kerminal')dmg=Math.floor(dmg*1.25);
  // KAIOKEN: +35% all damage
  if(atk.data.id==='kaioken_animal')dmg=Math.floor(dmg*1.35);
  // LEVEL 0 (Count Dracula SU): always crits - x2.5 on SU
  if(atk.data.id==='count_dracula'&&hb.key==='SU')dmg=Math.floor(dmg*2.5);
  // THUNDER CHARGE: next A/B deals double damage if charged
  if((atk.data.id==='thunder_monk')&&atk.chargeReady&&(hb.key==='A'||hb.key==='B')){dmg*=2;atk.chargeReady=false;FX.addText(atk.x,atk.y-atk.data.h-8,'CHARGED!','#ffcc00',18);}
  // NOVA AURA: each stack boosts attack damage by 15%
  if(atk.data.id==='nova_brawler'&&atk.novaCharge>0)dmg=Math.floor(dmg*(1+atk.novaCharge*.15));
  // ULTRA INSTINCT: auto-counter on frame 1 of A (both UI chars)
  if((def.data.id==='elmo_ultra'||def.data.id==='ui_shaggy')&&def.state==='attack'&&def.atkKey==='A'&&def.atkFrame<=2&&!def.dead){const counterDmg=Math.floor(a.d*.8);atk.takeDmg(counterDmg,{x:def.facing*6,y:-3},16);FX.addText(def.x,def.y-def.data.h-8,'COUNTER!','#ffffff',18);FX.hitSpark(atk.x,atk.y-atk.data.h*.5,false,'#ffffff');}
  // OVERHEAD attacks bypass block
  if(a.overhead&&def.blocking){def.blocking=false;def.blockCooldown=0;}
  const hit=def.takeDmg(dmg,a.kb,a.hs);
  if(hit){
    if(a.knockup){def.vy=-18;def.onGround=false;if(def.state!=='attack')def.state='jump';}
    if(a.slow&&def.vx!==0){def.vx*=.25;}
    // FUZZYBEAR WOCKA TRAP: C attack spawns bouncing pie that stuns
    if(atk.data.id==='fuzzybear'&&hb.key==='C'&&!atk.wockaSpawned){
      atk.wockaSpawned=true;
      const pie=new BasicProj(atk,atk.x+atk.facing*20,atk.y-20,atk.facing*3,-.5,14,'pie');
      pie.life=2.2;PROJS.push(pie);
      FX.addText(atk.x,atk.y-atk.data.h-8,'WOCKA WOCKA!','#ffcc44',18);
    }
    if(atk.data.id==='fuzzybear'&&atk.atkKey!=='C')atk.wockaSpawned=false;
    // OSCAR I LOVE TRASH: SP spawns 3 stench clouds in a spread
    if(atk.data.id==='oscar'&&hb.key==='SP'&&!atk.trashSpawned){
      atk.trashSpawned=true;
      for(let ti=0;ti<3;ti++){const tx=atk.x+atk.facing*(30+ti*28),ty=atk.y-20;const st=new BasicProj(atk,tx,ty,atk.facing*.5+(ti-1)*.3,-.8,18,'stench');st.life=3.5;PROJS.push(st);}
      FX.addText(atk.x,atk.y-atk.data.h-8,'I LOVE TRASH!','#88cc22',18);
    }
    if(atk.data.id==='oscar'&&atk.atkKey!=='SP')atk.trashSpawned=false;
    // SPIRIT SURGE: every 4th hit restores 8 HP
    if(atk.data.id==='spirit_blade'){atk.spiritHitCount=(atk.spiritHitCount||0)+1;if(atk.spiritHitCount%4===0){atk.hp=Math.min(atk.maxHp,atk.hp+8);FX.addText(atk.x,atk.y-atk.data.h-8,'+8 HP','#88aaff',14);}}
    // SMEAGOL - PRECIOUS GRIP: every 5th hit adds extra stun
    if(atk.data.id==='smeagol'){atk.atkHitCount=(atk.atkHitCount||0)+1;if(atk.atkHitCount%5===0){def.hitstunF=Math.max(def.hitstunF,60);FX.addText(atk.x,atk.y-atk.data.h-8,'MY PRECIOUS!!','#aaffaa',16);}}
    // SAURON - ONE RING DOMINION: every 4th hit spawns ring shockwave
    if(atk.data.id==='sauron'){atk.atkHitCount=(atk.atkHitCount||0)+1;if(atk.atkHitCount%4===0){const ringProj=new BasicProj(atk,atk.x,atk.y-80,atk.facing*9,-.5,24,'wave');ringProj.life=1.2;PROJS.push(ringProj);PROJS.push(new BasicProj(atk,atk.x,atk.y-80,-atk.facing*9,-.5,24,'wave'));FX.addText(atk.x,atk.y-atk.data.h-8,'RING POWER!','#ff8800',16);}}
    // JUDO MASTER - WIND SCAR: every 3rd hit auto-fires long-range wind blade
    if(atk.data.id==='judo_master'){atk.atkHitCount=(atk.atkHitCount||0)+1;if(atk.atkHitCount%3===0){const wind=new BasicProj(atk,atk.x,atk.y-atk.data.h*.6,atk.facing*11,0,22,'arc_wave');wind.life=1.4;PROJS.push(wind);FX.addText(atk.x,atk.y-atk.data.h-8,'WIND SCAR!','#aaddff',16);}}
    // NOVA AURA: taking damage builds nova stacks (handled in takeDmg)
    // SS KERMINAL / KAIOKEN: +25%/+35% damage aura - boost dmg before hit
    atk.hitSet.add(def);atk.meter=Math.min(MMAX,atk.meter+a.d*.18);
    const big=a.d>22||hb.key==='SU';const wx=def.x+(atk.x<def.x?-28:28);const wy=def.y-def.data.h*.5;
    FX.hitSpark(wx,wy,big,atk.data.color);JAZZ.hit(big);
    FX.addText(wx,wy-42,a.name||'+'+dmg,big?'#ffff00':'#fff',big?24:16);
    // Extra spark burst on big hits
    if(big){for(let sp=0;sp<8;sp++){const sa=sp/8*Math.PI*2;FX.parts.push({x:wx,y:wy,vx:Math.cos(sa)*rand(2,5),vy:Math.sin(sa)*rand(2,5)-2,life:.6,ml:.6,r:3+rand(0,3),col:a.col||'#ffff00',type:'s'});}}
    const now=Date.now();atk.comboCount=(now-atk.lastHitT<600)?atk.comboCount+1:1;atk.lastHitT=now;atk.comboTimer=1.8;
    if(big)FX.slowMo=.18;
  }
}

// ══════════════════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════════════════
function drawHUD(ctx,p1,p2,timer,round){
  // 8-bit pixel HUD
  const bw=250,bh=14,by=12,mg=26;
  // Dark scanline panel
  ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,48);
  // Single semi-transparent overlay replaces 24 stroke calls
  ctx.fillStyle='rgba(0,0,0,.06)';ctx.fillRect(0,0,W,48);
  const meterRainbow=`hsl(${frameNow*.5%360},100%,60%)`;
  // P1 health bar
  const p1r=Math.max(0,p1.maxHp>0?p1.hp/p1.maxHp:0);
  // Bar background (dark pixel border)
  ctx.fillStyle='#1a0800';ctx.fillRect(mg,by,bw+2,bh+2);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(mg+1,by+1,bw,bh);
  // Segment-style health (16 segments = old-school)
  const segs=20,segW=Math.floor(bw/segs)-1;
  for(let s=0;s<segs;s++){
    const ratio=s/segs;
    const filled=ratio<p1r;
    if(filled){
      const col=p1r>.5?'#00ee44':p1r>.25?'#eeaa00':'#ee2200';
      ctx.fillStyle=col;ctx.fillRect(mg+1+s*(segW+1),by+1,segW,bh);
      // Pixel shine
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(mg+1+s*(segW+1),by+1,segW,3);
    }
  }
  // Pixel border
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.strokeRect(mg,by,bw+2,bh+2);
  // Name in 8-bit caps
  ctx.fillStyle=p1.data.color;ctx.font='bold 10px monospace';ctx.textAlign='left';
  ctx.fillText(p1.data.name,mg,by-2);
  // Meter bar (pixel blocks)
  const sm1=Math.round((p1.meter/MMAX)*bw);
  ctx.fillStyle='#0a0a22';ctx.fillRect(mg,by+bh+3,bw+2,7);
  for(let mx=0;mx<sm1;mx+=4){ctx.fillStyle=p1.meter>=100?meterRainbow:'#0088ff';ctx.fillRect(mg+1+mx,by+bh+4,3,5);}
  ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(mg,by+bh+3,bw+2,7);

  // P2 health bar
  const p2r=Math.max(0,p2.maxHp>0?p2.hp/p2.maxHp:0);
  const rx=W-mg-bw-2;
  ctx.fillStyle='#1a0800';ctx.fillRect(rx-1,by,bw+2,bh+2);
  ctx.fillStyle='#0a0a0a';ctx.fillRect(rx,by+1,bw,bh);
  for(let s=0;s<segs;s++){
    const ratio=s/segs;
    const filled=(segs-1-s)/segs<p2r;
    if(filled){
      const col=p2r>.5?'#00ee44':p2r>.25?'#eeaa00':'#ee2200';
      ctx.fillStyle=col;ctx.fillRect(rx+s*(segW+1),by+1,segW,bh);
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(rx+s*(segW+1),by+1,segW,3);
    }
  }
  ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.strokeRect(rx-1,by,bw+2,bh+2);
  ctx.fillStyle=p2.data.color;ctx.font='bold 10px monospace';ctx.textAlign='right';
  ctx.fillText(p2.data.name,W-mg,by-2);
  const sm2=Math.round((p2.meter/MMAX)*bw);
  ctx.fillStyle='#0a0a22';ctx.fillRect(rx-1,by+bh+3,bw+2,7);
  for(let mx=0;mx<sm2;mx+=4){ctx.fillStyle=p2.meter>=100?meterRainbow:'#0088ff';ctx.fillRect(rx+bw-sm2+mx,by+bh+4,3,5);}
  ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.strokeRect(rx-1,by+bh+3,bw+2,7);

  // Timer - pixel box
  const ts=Math.max(0,Math.ceil(timer));
  const tCol=ts<=10?'#ff2200':ts<=20?'#ffaa00':'#ffffff';
  ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(W/2-18,by-1,36,bh+2);
  ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(W/2-18,by-1,36,bh+2);
  ctx.fillStyle=tCol;ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText(ts<10?'0'+ts:ts,W/2,by+12);
  // Round pixel dots
  ctx.font='bold 8px monospace';ctx.fillStyle='#888';ctx.fillText('RD'+round,W/2,by-3);
  // Win boxes
  const winData=[[0,p1Wins,p1.data.color,mg],[1,p2Wins,p2.data.color,W-mg]];
  for(let wi=0;wi<2;wi++){const[si,wins,col,px2]=winData[wi];
    for(let w=0;w<2;w++){
      const wx=(si===0?px2+bw-40+w*16:px2-bw+24+w*16);
      ctx.fillStyle=w<wins?col:'#222';ctx.fillRect(wx,by+bh+3,12,7);ctx.strokeStyle='#555';ctx.lineWidth=1;ctx.strokeRect(wx,by+bh+3,12,7);
    }
  }
  // Low HP danger flash
  const dangerFlashA=`rgba(255,0,0,${Math.abs(Math.sin(frameNow*.006))*.1})`;
  if(p1r<.25&&p1r>0){ctx.fillStyle=dangerFlashA;ctx.fillRect(0,0,W/2,H);}
  if(p2r<.25&&p2r>0){ctx.fillStyle=dangerFlashA;ctx.fillRect(W/2,0,W/2,H);}
}

function gridPos(idx){
  // Adaptive grid: scales columns + card size so every roster fits on screen
  const n=getDisplayRoster().length,gap=4,topY=54,botMargin=24;
  const cols=n>20?7:n>12?6:5;
  const rows=Math.ceil(n/cols);
  const availH=H-topY-botMargin;
  const cardH=Math.min(78,Math.floor((availH-(rows-1)*gap)/rows));
  const cw=Math.min(86,Math.floor((W-16-(cols-1)*gap)/cols));
  const row=Math.floor(idx/cols),col=idx%cols;
  const gw=cols*(cw+gap)-gap,startX=(W-gw)/2;
  return{x:startX+col*(cw+gap),y:topY+row*(cardH+gap),w:cw,h:cardH};
}

function drawTitle(ctx,t){

const _survBest=parseInt(localStorage.getItem('pf_survbest')||'0',10)||0;
const SURV={wave:1,score:0,streak:0,best:_survBest,waveTimer:0,waveClearing:false,waveClearTimer:0,totalKOs:0,phantomUnlocked:false};
function saveSurvBest(){try{localStorage.setItem('pf_survbest',String(SURV.best));}catch(e){}}
function survDifficulty(){return Math.min(3,1+SURV.wave*.22);}
function survOpponent(heroId){
  // Boss waves
  if(SURV.wave===6)return'judo_master';
  if(SURV.wave===10)return'smeagol';
  if(SURV.wave===15)return'sauron';
  const basePool=ALL.filter(id=>id!==heroId);
  const animePool=Object.keys(ANIME_CHARS).filter(id=>id!==heroId);
  const superPool=Object.keys(UNLOCKABLE_CHARS).filter(id=>id!==heroId&&UNLOCKABLE_CHARS[id]);
  let pool;
  if(SURV.wave<=2)pool=[...basePool];
  else if(SURV.wave<=5)pool=[...basePool,...animePool];
  else pool=[...basePool,...animePool,...superPool];
  if(!pool.length)pool=[...ALL.filter(id=>id!==heroId)];
  if(!pool.length)pool=[...ALL];
  return pool[Math.floor(Math.random()*pool.length)];
}
function survHPRestore(){if(p1){p1.hp=Math.min(p1.maxHp,p1.hp+Math.max(30,60-SURV.wave*3));}}

  const prevHp=p1?p1.hp:d1.hp;
  p1=new Fighter(d1,0);
  p1.hp=Math.min(d1.hp,prevHp||d1.hp);
  p2=new Fighter(oppData,1);
  const sc=1+SURV.wave*.08;p2.maxHp=Math.floor(p2.data.hp*sc);p2.hp=p2.maxHp;
  // Thematic stage for boss waves; random otherwise
  if(SURV.wave===6)stage=8;// Wing Zero Colony - Judo Master
  else if(SURV.wave===10)stage=7;// Hobbiton - Smeagol (LOTR)
  else if(SURV.wave===15)stage=9;// Gotham City - Sauron (dark, epic)
  else stage=0|rand(0,STAGES.length);
  PROJS=[];FX.parts=[];FX.trails=[];FX.flashA=0;
  p1Wins=0;p2Wins=0;round=1;roundTimer=Math.max(30,60-SURV.wave*2);roundOverTimer=0;
  ai.reset();vsT=0;STATE='vs';
}
